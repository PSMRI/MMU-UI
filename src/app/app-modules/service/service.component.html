<app-header [showRoles]="false"></app-header>

<div class="flex min-h-[calc(100svh-3.5rem)] items-center justify-center px-6 py-10">
  <z-card
    class="w-full max-w-lg animate-in fade-in-0 slide-in-from-bottom-2 duration-300 motion-reduce:animate-none">
    <z-card-header class="flex flex-col items-center gap-1.5 text-center">
      <z-card-title>Welcome {{ fullName }}</z-card-title>
      <z-card-description>Click on a service to proceed</z-card-description>
    </z-card-header>

    <z-card-content>
      <div class="flex flex-wrap justify-center gap-4">
        <button
          z-button
          zType="default"
          type="button"
          *ngFor="let service of servicesList"
          (click)="selectService(service)"
          class="h-auto min-h-36 max-w-80 flex-1 basis-72 gap-4 px-7 py-6 text-2xl font-semibold">
          <img
            class="size-20 object-contain"
            [src]="'assets/images/' + service.serviceName + '.png'"
            [alt]="service.serviceName" />
          <span class="whitespace-nowrap">{{ service.serviceName }}</span>
        </button>
      </div>
    </z-card-content>
  </z-card>
</div>

<div
  class="flex items-center justify-between gap-3 border-b border-border px-4 py-3">
  <span class="text-base font-semibold text-foreground">
    {{ current_language_set?.files }}
  </span>
  <button
    z-button
    zType="ghost"
    zSize="icon-sm"
    type="button"
    [zTooltip]="current_language_set?.common?.close"
    zPosition="bottom"
    [attr.aria-label]="current_language_set?.common?.close"
    (click)="closeDialog()">
    <ng-icon name="lucideX"></ng-icon>
  </button>
</div>

<div
  class="flex flex-wrap gap-2 p-4"
  *ngIf="fileObj && fileObj.length > 0">
  <span
    *ngFor="let file of fileObj"
    class="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-xs font-medium"
    [ngClass]="
      file.isUploaded
        ? 'bg-muted text-muted-foreground'
        : 'bg-secondary text-secondary-foreground'
    ">
    {{ file.fileName }}
    <button
      *ngIf="!file.isUploaded"
      type="button"
      class="inline-flex appearance-none items-center justify-center rounded-full border-0 bg-transparent p-0.5 text-current hover:bg-foreground/10 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
      [attr.aria-label]="current_language_set?.common?.close"
      (click)="remove(file)">
      <ng-icon name="lucideX" size="12"></ng-icon>
    </button>
  </span>
</div>

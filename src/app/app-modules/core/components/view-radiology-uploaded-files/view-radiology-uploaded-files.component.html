<div
  class="flex items-center justify-between gap-3 border-b border-border px-4 py-3">
  <span class="text-base font-semibold text-foreground">
    {{ current_language_set?.coreComponents?.filesClickToDownload }}
  </span>
  <button
    z-button
    zType="ghost"
    zSize="icon-sm"
    type="button"
    [zTooltip]="current_language_set?.common?.close"
    zPosition="bottom"
    [attr.aria-label]="current_language_set?.common?.close"
    (click)="dialogRef.close()">
    <ng-icon name="lucideX"></ng-icon>
  </button>
</div>

<div class="p-4">
  <p
    *ngIf="fileIds[0] === null"
    class="py-4 text-center text-muted-foreground">
    {{ current_language_set?.noRecordsFound }}
  </p>

  <ul
    *ngIf="fileIds[0] !== null"
    class="m-0 list-none divide-y divide-border p-0">
    <li *ngFor="let fileID of fileIds; let i = index">
      <button
        type="button"
        class="flex w-full items-center gap-2 rounded-md px-2 py-2 text-left text-sm transition-colors hover:bg-muted/50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
        (click)="openFileContent(fileID)">
        <span class="text-muted-foreground">{{ i + 1 }}.</span>
        <span class="text-primary underline-offset-2 hover:underline">
          {{ fileID['fileName'] }}
        </span>
      </button>
    </li>
  </ul>
</div>

<header class="app-header">
  <a class="app-header-brand" aria-label="Piramal Swasthya">
    <img src="assets/images/Swasthya.png" alt="Piramal Swasthya" />
  </a>

  <div class="app-header-actions">
    <!-- Language -->
    <label *ngIf="status" class="lang-field">
      <span class="lang-label">{{ currentLanguageSet?.common?.SelectLanguage }}</span>
      <select
        class="lang-select"
        name="app_language"
        [(ngModel)]="app_language"
        (change)="changeLanguage(app_language)">
        <option
          *ngFor="let language of languageArray"
          [value]="language.languageName">
          {{ language.languageName }}
        </option>
      </select>
    </label>

    <!-- Bluetooth -->
    <button
      *ngIf="isAuthenticated"
      type="button"
      class="icon-btn icon-btn--bt"
      [ngClass]="{ 'is-connected': isConnected }"
      [zTooltip]="currentLanguageSet?.common?.connectBluetooth || 'Connect Bluetooth'"
      zPosition="bottom"
      (click)="openIOT()">
      <ng-icon
        [name]="isConnected ? 'lucideBluetoothConnected' : 'lucideBluetooth'"
        size="20"></ng-icon>
    </button>

    <!-- User (profile — green) -->
    <span *ngIf="userName" class="chip">
      <ng-icon class="chip-icon chip-icon-user" name="lucideCircleUser" size="20"></ng-icon>
      <span class="chip-label">{{ currentLanguageSet?.user }}:</span>
      <span class="chip-value">{{ userName | titlecase }}</span>
    </span>

    <!-- Service point (location — red) -->
    <a
      *ngIf="servicePoint"
      class="chip chip-link"
      [routerLink]="'/servicePoint'"
      [zTooltip]="currentLanguageSet?.servicePoint || 'Service Point'"
      zPosition="bottom">
      <ng-icon class="chip-icon chip-icon-location" name="lucideMapPin" size="20"></ng-icon>
      <span class="chip-label">{{ currentLanguageSet?.servicePoint }}:</span>
      <span class="chip-value">{{ servicePoint | titlecase }}</span>
    </a>

    <!-- Help (version / license menu) -->
    <button
      *ngIf="isAuthenticated"
      type="button"
      class="icon-btn icon-btn--help"
      [zMenuTriggerFor]="helpMenu"
      [zTooltip]="currentLanguageSet?.help || 'Help'"
      zPosition="bottom">
      <ng-icon name="lucideCircleHelp" size="20"></ng-icon>
    </button>
    <z-menu #helpMenu="zMenu">
      <button z-menu-item (click)="showVersionAndCommitDetails()">
        <ng-icon name="lucideInfo" size="16"></ng-icon>
        {{ currentLanguageSet?.version }} : {{ versionUI }}
      </button>
      <a z-menu-item target="_blank" rel="noopener noreferrer" [href]="helpURL">
        <ng-icon name="lucideFileText" size="16"></ng-icon>
        {{ currentLanguageSet?.licenseInfo }}
      </a>
    </z-menu>

    <!-- Logout (red) -->
    <button
      *ngIf="isAuthenticated"
      type="button"
      class="icon-btn icon-btn--danger"
      [zTooltip]="currentLanguageSet?.logOut || 'Log out'"
      zPosition="bottom"
      (click)="logout()">
      <ng-icon name="lucidePower" size="20"></ng-icon>
    </button>
  </div>
</header>

<!-- Role navigation -->
<nav *ngIf="showRoles" class="app-subnav">
  <ng-container *ngFor="let item of filteredNavigation; let isLast = last">
    <a class="subnav-link" [routerLink]="[item.link]" routerLinkActive="active">
      {{ item.label }}
    </a>
    <a
      *ngIf="isLast"
      class="subnav-link"
      routerLink="/nurse-doctor/reports"
      routerLinkActive="active">
      {{ currentLanguageSet?.common?.report }}
    </a>
  </ng-container>
</nav>

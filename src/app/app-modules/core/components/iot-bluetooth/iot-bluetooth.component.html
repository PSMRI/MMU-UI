<div class="flex flex-col gap-4 p-6">
  <!-- Header: bluetooth icon + title, disconnect + close actions -->
  <div class="flex items-center gap-3">
    <ng-icon
      name="lucideBluetooth"
      size="20"
      [ngClass]="
        errMsg !== undefined
          ? 'text-destructive'
          : deviceConnected
            ? 'text-success'
            : 'text-primary'
      "></ng-icon>
    <p class="m-0 flex-1 text-lg font-semibold text-foreground">
      {{ current_language_set?.bluetooth }}
    </p>
    <button
      *ngIf="deviceConnected"
      z-button
      zType="outline"
      type="button"
      [attr.title]="current_language_set?.coreComponents?.disconnectDevice"
      (click)="disconnectBluetoothDevice()">
      {{ current_language_set?.disconnect }}
    </button>
    <button
      z-button
      zType="ghost"
      zSize="icon"
      class="p-0"
      aria-label="Close"
      (click)="dialogRef.close(true)">
      <ng-icon name="lucideX"></ng-icon>
    </button>
  </div>

  <!-- Body -->
  <div>
    <!-- Loading -->
    <div
      *ngIf="spinner"
      class="flex items-center justify-center gap-3 py-8 text-sm text-muted-foreground">
      <z-loader></z-loader>
      <span>{{ current_language_set?.pleaseWaitFetchingRequiredData }}</span>
    </div>

    <div *ngIf="!spinner">
      <div *ngIf="apiAvailable">
        <!-- Connected: device test/pair status list -->
        <div *ngIf="deviceConnected" class="flex flex-col gap-2">
          <div
            class="flex items-center justify-between gap-3 rounded-lg border border-border bg-card px-4 py-2"
            *ngFor="let key of infoDetails">
            <span class="flex items-center gap-2 text-sm text-foreground">
              {{ key.name }}
              <ng-icon
                *ngIf="key.status"
                name="lucideCheck"
                size="16"
                class="text-success"></ng-icon>
              <ng-icon
                *ngIf="key.status !== undefined && !key.status"
                name="lucideX"
                size="16"
                class="text-destructive"></ng-icon>
            </span>
            <button
              *ngIf="key.pairStatus === 'NP'"
              z-button
              zType="default"
              zSize="sm"
              (click)="pairDevice(key)">
              {{ current_language_set?.pair }}
            </button>
            <button
              *ngIf="key.pairStatus === 'P'"
              z-button
              zType="secondary"
              zSize="sm"
              disabled>
              {{ current_language_set?.pairing }}
            </button>
            <span
              *ngIf="key.pairStatus === 'PC'"
              class="inline-flex items-center gap-1 rounded-md bg-success/10 px-2.5 py-1 text-xs font-medium text-success">
              <ng-icon name="lucideCheck" size="14"></ng-icon>
              {{ current_language_set?.paired }}
            </span>
            <button
              *ngIf="key.pairStatus === 'R'"
              z-button
              zType="destructive"
              zSize="sm"
              (click)="pairDevice(key)">
              {{ current_language_set?.retry }}
            </button>
          </div>
        </div>

        <!-- Not connected: search + device list -->
        <div
          class="flex flex-col items-start gap-3"
          *ngIf="!deviceConnected">
          <button
            z-button
            zType="default"
            (click)="getBluetoothDevice()">
            {{ current_language_set?.searchBletoothDevice }}
          </button>
          <button
            *ngFor="let device of bluetoothDevices"
            z-button
            zType="outline"
            class="w-full justify-start"
            (click)="connectBluetoothDevice(device)">
            {{ device }}
          </button>
        </div>
      </div>

      <!-- API / SDK not up -->
      <div
        *ngIf="!apiAvailable"
        class="py-8 text-center text-sm text-muted-foreground">
        {{ current_language_set?.IOTsdkNotUp }}
      </div>
    </div>
  </div>
</div>

<!-- Shared header: status icon + title, colored by status (info/success/warn/error) -->
<ng-template #dialogHeader let-status="status" let-text="text">
  <div class="flex items-center gap-2">
    <ng-icon
      [name]="statusIcon(status)"
      size="20"
      [ngClass]="statusColor(status)"></ng-icon>
    <p class="m-0 text-base font-semibold" [ngClass]="statusColor(status)">
      {{ text }}
    </p>
  </div>
</ng-template>

<!-- Confirm (confirmAlert and confirmcalibration are identical) -->
<div
  *ngIf="confirmAlert || confirmcalibration"
  class="flex flex-col gap-4 p-1">
  <ng-container
    *ngTemplateOutlet="
      dialogHeader;
      context: {
        status: title,
        text: (title === 'warn' ? 'warning' : title) | titlecase
      }
    "></ng-container>
  <p class="m-0 text-sm text-muted-foreground">{{ message }}</p>
  <div class="flex justify-end gap-2">
    <button z-button zType="outline" (click)="dialogRef.close(false)">
      {{ btnCancelText }}
    </button>
    <button
      z-button
      zType="default"
      (click)="dialogRef.close(true)"
      cdkFocusInitial>
      {{ btnOkText }}
    </button>
  </div>
</div>

<!-- Alert / alertError (single acknowledge button) -->
<div *ngIf="alert || alertError" class="flex flex-col gap-4 p-1">
  <ng-container
    *ngTemplateOutlet="
      dialogHeader;
      context: {
        status: status,
        text: (status === 'warn' ? 'warning' : status) | titlecase
      }
    "></ng-container>
  <p class="m-0 text-sm text-muted-foreground">{{ message }}</p>
  <div class="flex justify-end gap-2">
    <button
      z-button
      zType="default"
      (click)="dialogRef.close(true)"
      cdkFocusInitial>
      {{ btnOkText }}
    </button>
  </div>
</div>

<!-- Remarks (single-line) -->
<div *ngIf="remarks" class="flex flex-col gap-4 p-1">
  <ng-container
    *ngTemplateOutlet="
      dialogHeader;
      context: { status: 'info', text: message | titlecase }
    "></ng-container>
  <z-form-field>
    <label z-form-label for="dialog-remarks">Enter Remarks</label>
    <z-form-control>
      <input
        z-input
        id="dialog-remarks"
        autocomplete="off"
        name="Remarks"
        #remarksRef />
    </z-form-control>
  </z-form-field>
  <div class="flex justify-end gap-2">
    <button z-button zType="outline" (click)="dialogRef.close(false)">
      {{ btnCancelText }}
    </button>
    <button z-button zType="default" (click)="dialogRef.close(remarksRef.value)">
      {{ btnOkText }}
    </button>
  </div>
</div>

<!-- Edit remarks (multi-line) -->
<div *ngIf="editRemarks" class="flex flex-col gap-4 p-1">
  <ng-container
    *ngTemplateOutlet="
      dialogHeader;
      context: { status: 'info', text: message | titlecase }
    "></ng-container>
  <textarea
    z-input
    class="min-h-20"
    aria-label="Observation"
    allowText="textAreaValidator"
    placeholder="Observation"
    name="Remarks"
    maxLength="500"
    #remarksRef
    [(ngModel)]="comments"></textarea>
  <div class="flex justify-end gap-2">
    <button z-button zType="outline" (click)="dialogRef.close(false)">
      {{ btnCancelText }}
    </button>
    <button
      z-button
      zType="default"
      (click)="dialogRef.close(remarksRef.value + '.')">
      {{ btnOkText }}
    </button>
  </div>
</div>

<!-- Notify (mandatory-fields list) -->
<div *ngIf="notify" class="flex flex-col gap-4 p-1">
  <ng-container
    *ngTemplateOutlet="
      dialogHeader;
      context: { status: 'info', text: 'Info' }
    "></ng-container>
  <div class="flex flex-col gap-2">
    <p class="m-0 text-sm text-muted-foreground">{{ message | titlecase }}</p>
    <ul class="flex flex-col gap-1">
      <li
        class="flex items-center gap-2 rounded-md bg-destructive/10 px-3 py-1.5 text-sm text-destructive"
        *ngFor="let items of mandatories">
        <ng-container
          *ngIf="
            items !== undefined &&
            items !== null &&
            items.toLowerCase() !== 'ABHA'.toLowerCase() &&
            items.toLowerCase() !== 'ABHA Generation Mode'.toLowerCase()
          ">
          <ng-icon name="lucideChevronRight" size="16"></ng-icon>
          <span>{{ items | titlecase }}</span>
        </ng-container>
        <ng-container
          *ngIf="
            items !== undefined &&
            items !== null &&
            (items.toLowerCase() === 'ABHA'.toLowerCase() ||
              items.toLowerCase() === 'ABHA Generation Mode'.toLowerCase())
          ">
          <ng-icon name="lucideChevronRight" size="16"></ng-icon>
          <span>{{ items }}</span>
        </ng-container>
      </li>
    </ul>
  </div>
  <div class="flex justify-end gap-2">
    <button
      z-button
      zType="default"
      (click)="dialogRef.close(true)"
      cdkFocusInitial>
      {{ btnOkText }}
    </button>
  </div>
</div>

<!-- Choice (radio) -->
<div *ngIf="choice" class="flex flex-col gap-4 p-1">
  <ng-container
    *ngTemplateOutlet="
      dialogHeader;
      context: { status: 'info', text: 'Info' }
    "></ng-container>
  <div class="flex flex-col gap-2">
    <p class="m-0 text-sm text-muted-foreground">{{ message | titlecase }}</p>
    <z-radio-group [(ngModel)]="selectedValue" class="gap-2">
      <z-radio *ngFor="let value of values" [value]="value.id">
        {{ value.name }}
      </z-radio>
    </z-radio-group>
  </div>
  <div class="flex justify-end gap-2">
    <button z-button zType="outline" (click)="dialogRef.close(false)">
      {{ btnCancelText }}
    </button>
    <button
      z-button
      zType="default"
      (click)="dialogRef.close(selectedValue)"
      cdkFocusInitial>
      {{ btnOkText }}
    </button>
  </div>
</div>

<!-- Session timeout (with nested choiceSelect, preserved as in the original) -->
<div *ngIf="sessionTimeout" class="flex flex-col gap-4 p-1">
  <ng-container
    *ngTemplateOutlet="
      dialogHeader;
      context: { status: 'warn', text: title }
    "></ng-container>
  <p class="m-0 text-sm text-muted-foreground">
    <span>{{ message }} &nbsp;</span>
    <small>
      <span *ngIf="minutes >= 1"
        >{{ minutes.toFixed(0) }} &nbsp; minutes &nbsp;</span
      >
      <span *ngIf="seconds > 0">{{ seconds }} &nbsp; seconds</span>
    </small>
  </p>
  <div class="flex justify-end gap-2">
    <button z-button zType="outline" (click)="stopTimer()">
      {{ btnCancelText }}
    </button>
    <button
      z-button
      zType="default"
      (click)="continueSession()"
      cdkFocusInitial>
      {{ btnOkText }}
    </button>
  </div>

  <div *ngIf="choiceSelect" class="flex flex-col gap-4 p-1">
    <ng-container
      *ngTemplateOutlet="
        dialogHeader;
        context: { status: 'info', text: 'Info' }
      "></ng-container>
    <div class="flex flex-col gap-2">
      <p class="m-0 text-sm text-muted-foreground">{{ message | titlecase }}</p>
      <z-radio-group [(ngModel)]="selectedOption" class="gap-2">
        <z-radio *ngFor="let option of options" [value]="option.id">
          {{ option.name }}
        </z-radio>
      </z-radio-group>
    </div>
    <div class="flex justify-end gap-2">
      <button z-button zType="outline" (click)="dialogRef.close(false)">
        {{ btnCancelText }}
      </button>
      <button
        z-button
        zType="default"
        (click)="dialogRef.close(selectedOption)"
        cdkFocusInitial>
        {{ btnOkText }}
      </button>
    </div>
  </div>
</div>

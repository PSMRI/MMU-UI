<div class="flex items-start justify-center px-4 py-10">
  <z-card class="relative w-full max-w-md">
    <!-- Close (dialog mode only: master download / TM case-sheet authorization) -->
    <button
      *ngIf="data?.masterDowloadFirstTime || data?.provideAuthorizationToViewTmCS"
      z-button
      zType="ghost"
      zSize="icon"
      type="button"
      class="absolute right-3 top-3 text-muted-foreground"
      aria-label="Close"
      (click)="closeDialog()">
      <ng-icon name="lucideX"></ng-icon>
    </button>

    <z-card-header class="flex flex-col items-center gap-1.5 text-center">
      <img
        class="mb-2 h-12 w-auto"
        src="assets/images/Swasthya.png"
        alt="Piramal Swasthya" />
      <z-card-title>{{
        current_language_set?.common?.confirmYourIdentityToPerformThisAction ||
          'Confirm your identity to perform this action'
      }}</z-card-title>
    </z-card-header>

    <z-card-content>
      <form
        class="grid gap-6"
        [formGroup]="loginForm"
        (ngSubmit)="loginForm.valid && dataSyncLogin()"
        autocomplete="off">
        <z-form-field>
          <label z-form-label for="userID">Enter User Name</label>
          <z-form-control>
            <div class="relative">
              <ng-icon
                class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
                name="lucideUser"
                size="18"
                aria-hidden="true"></ng-icon>
              <input
                z-input
                class="w-full pl-9"
                type="text"
                id="userID"
                name="userName"
                formControlName="userName"
                allowText="usernameValidator"
                #focus
                placeholder="Enter user name"
                autocomplete="username" />
            </div>
          </z-form-control>
        </z-form-field>

        <z-form-field>
          <label z-form-label for="password">Enter Password</label>
          <z-form-control>
            <div class="relative">
              <ng-icon
                class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
                name="lucideLock"
                size="18"
                aria-hidden="true"></ng-icon>
              <input
                z-input
                class="w-full pl-9 pr-10"
                [type]="dynamictype"
                id="password"
                name="password"
                formControlName="password"
                placeholder="Enter password"
                autocomplete="off" />
              <button
                type="button"
                class="absolute right-3 top-1/2 inline-flex -translate-y-1/2 appearance-none items-center justify-center border-0 bg-transparent p-0 text-muted-foreground transition-colors hover:text-foreground focus-visible:text-foreground focus-visible:outline-none"
                (click)="togglePWD()"
                [attr.aria-label]="
                  dynamictype === 'text'
                    ? (current_language_set?.common?.hidePassword ||
                      'Hide password')
                    : (current_language_set?.common?.showPassword ||
                      'Show password')
                "
                [attr.aria-pressed]="dynamictype === 'text'">
                <ng-icon
                  [name]="dynamictype === 'text' ? 'lucideEyeOff' : 'lucideEye'"
                  size="18"></ng-icon>
              </button>
            </div>
          </z-form-control>
        </z-form-field>

        <button z-button type="submit" zType="default" zFull>
          {{ current_language_set?.common?.proceed || 'Proceed' }}
        </button>
      </form>
    </z-card-content>

    <!-- Loading overlay while authenticating -->
    <div
      *ngIf="showProgressBar"
      class="absolute inset-0 z-10 flex items-center justify-center rounded-xl bg-background/70">
      <span
        class="size-8 animate-spin rounded-full border-2 border-muted border-t-primary"
        role="status"
        aria-label="Loading"></span>
    </div>
  </z-card>
</div>

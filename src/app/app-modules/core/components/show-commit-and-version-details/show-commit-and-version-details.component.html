<div
  class="flex items-center justify-between gap-3 border-b border-border px-4 py-3">
  <span class="text-base font-semibold text-foreground">
    {{ current_language_set?.common?.versionDetails }}
  </span>
  <button
    z-button
    zType="ghost"
    zSize="icon-sm"
    type="button"
    [attr.aria-label]="current_language_set?.common?.close"
    (click)="dialogRef.close(true)">
    <ng-icon name="lucideX"></ng-icon>
  </button>
</div>

<div class="p-4">
  <div class="w-full overflow-x-auto">
    <table z-table>
      <thead z-table-header>
        <tr z-table-row>
          <th z-table-head></th>
          <th z-table-head>API</th>
          <th z-table-head>UI</th>
        </tr>
      </thead>
      <tbody z-table-body>
        <tr z-table-row>
          <td z-table-cell class="font-medium">
            {{ current_language_set?.common?.version }}
          </td>
          <td z-table-cell>{{ input.commitDetailsAPI.version }}</td>
          <td z-table-cell>{{ input.commitDetailsUI.version }}</td>
        </tr>
        <tr z-table-row>
          <td z-table-cell class="font-medium">
            {{ current_language_set?.common?.commit }}
          </td>
          <td z-table-cell>{{ input.commitDetailsAPI.commit }}</td>
          <td z-table-cell>{{ input.commitDetailsUI.commit }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

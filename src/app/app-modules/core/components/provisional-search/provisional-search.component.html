<div class="flex flex-col gap-4 p-6">
  <div class="flex items-center justify-between gap-2">
    <p class="text-lg font-semibold text-foreground">
      {{ placeHolderSearch }} {{ current_language_set?.selection }}
    </p>
    <button
      z-button
      zType="ghost"
      zSize="icon"
      class="p-0"
      [zTooltip]="current_language_set?.common?.close"
      zPosition="bottom"
      aria-label="Close"
      (click)="dialogRef.close()">
      <ng-icon name="lucideX"></ng-icon>
    </button>
  </div>

  <div class="flex flex-col gap-3 sm:flex-row sm:items-end">
    <z-form-field class="w-full sm:max-w-xs">
      <label z-form-label for="provisional-search-input">{{
        placeHolderSearch
      }}</label>
      <z-form-control>
        <input
          z-input
          id="provisional-search-input"
          class="w-full bg-background"
          autocomplete="off"
          #inputSearch="ngModel"
          minlength="3"
          maxlength="100"
          name="searchTerm"
          [(ngModel)]="input.searchTerm"
          (keyup.enter)="search(input.searchTerm, 0)"
          (ngModelChange)="resetData()" />
      </z-form-control>
    </z-form-field>
    <button
      z-button
      zType="default"
      type="button"
      [disabled]="!inputSearch.valid"
      (click)="search(input.searchTerm, 0)">
      <ng-icon name="lucideSearch"></ng-icon>
      {{ current_language_set?.common?.search }}
    </button>
  </div>

  <div
    *ngIf="showProgressBar"
    class="flex items-center justify-center py-6"
    role="status"
    aria-live="polite">
    <z-loader></z-loader>
  </div>

  <div class="w-full overflow-x-auto">
    <table z-table>
      <thead z-table-header>
        <tr z-table-row>
          <th z-table-head>{{ current_language_set?.common?.ConceptID }}</th>
          <th z-table-head>{{ current_language_set?.common?.term }}</th>
          <th z-table-head></th>
        </tr>
      </thead>
      <tbody z-table-body>
        <tr z-table-row *ngFor="let element of pagedList">
          <td z-table-cell>{{ element?.conceptID }}</td>
          <td z-table-cell>{{ element?.term }}</td>
          <td z-table-cell class="text-center">
            <z-checkbox
              [zChecked]="element.selected || selectedDiagnosis(element)"
              [disabled]="disableSelection(element)"
              aria-label="Select diagnosis"
              (zCheckedChange)="selectDiagnosis($event, element)"></z-checkbox>
          </td>
        </tr>
        <tr z-table-row *ngIf="diagnosisData.length === 0">
          <td
            z-table-cell
            [attr.colspan]="displayedColumns.length"
            class="h-24 text-center text-muted-foreground">
            {{ current_language_set?.noRecordsFound }}
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div
    class="flex flex-wrap items-center justify-end gap-4"
    *ngIf="diagnosisData.length > 0">
    <div
      class="inline-flex items-center gap-2 text-[0.8125rem] text-muted-foreground">
      <span>{{ current_language_set?.rowsPerPage }}</span>
      <z-select
        class="w-[4.5rem]"
        name="pageSize"
        [zValue]="pageSize.toString()"
        (zSelectionChange)="changePageSize($event)">
        <z-select-item
          *ngFor="let size of pageSizeOptions"
          [zValue]="size.toString()">
          {{ size }}
        </z-select-item>
      </z-select>
    </div>

    <ul z-pagination-content class="m-0">
      <li z-pagination-item>
        <button
          z-pagination-button
          [zDisabled]="currentPage === 1"
          aria-label="Previous page"
          (click)="prevPage()">
          <ng-icon name="lucideChevronLeft" size="16"></ng-icon>
        </button>
      </li>
      <li z-pagination-item *ngFor="let p of pageNumbers">
        <button
          z-pagination-button
          [zActive]="p === currentPage"
          (click)="goToPage(p)">
          {{ p }}
        </button>
      </li>
      <li z-pagination-item>
        <button
          z-pagination-button
          [zDisabled]="currentPage === totalPages"
          aria-label="Next page"
          (click)="nextPage()">
          <ng-icon name="lucideChevronRight" size="16"></ng-icon>
        </button>
      </li>
    </ul>
  </div>

  <div class="flex justify-end gap-2">
    <button
      z-button
      zType="default"
      (click)="submitDiagnosisList()"
      [disabled]="selectedDiagnosisList.length === 0">
      {{ current_language_set?.common?.submit }}
    </button>
  </div>
</div>

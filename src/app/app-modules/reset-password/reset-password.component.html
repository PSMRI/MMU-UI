<div
  class="flex min-h-svh w-full flex-col items-center justify-center gap-6 bg-muted p-6 md:p-10">
  <z-card class="w-full max-w-sm">
    <z-card-header class="flex flex-col items-center gap-1.5 text-center">
      <img
        class="mb-2 h-12 w-auto"
        src="assets/images/Swasthya.png"
        alt="Piramal Swasthya" />
      <z-card-title>Account Support</z-card-title>
      <z-card-description>Follow the steps to change or reset your password</z-card-description>
    </z-card-header>

    <z-card-content>
      <!-- Step 1 — identify the account -->
      <form *ngIf="hideOnGettingQuestions" class="grid gap-6" autocomplete="off">
        <z-form-field>
          <label z-form-label zRequired for="userID">User Name</label>
          <z-form-control>
            <div class="relative flex items-center">
              <ng-icon
                class="pointer-events-none absolute left-3 text-muted-foreground"
                name="lucideUser"
                size="18"
                aria-hidden="true"></ng-icon>
              <input
                z-input
                class="w-full pl-9"
                type="text"
                id="userID"
                name="userID"
                [(ngModel)]="userID"
                allowText="usernameValidator"
                autocomplete="username"
                minlength="2"
                required
                #uname="ngModel"
                placeholder="Enter user name" />
            </div>
          </z-form-control>
        </z-form-field>

        <div class="grid grid-cols-2 gap-3">
          <button z-button type="button" zType="outline" zFull [routerLink]="['/']">
            Cancel
          </button>
          <button
            z-button
            type="button"
            zType="default"
            zFull
            [disabled]="!uname.valid"
            (click)="getQuestions(userID)">
            Next
          </button>
        </div>
      </form>

      <!-- Step 2 — answer the security questions one at a time -->
      <form *ngIf="showQuestions" class="grid gap-6" autocomplete="off">
        <z-form-field>
          <label z-form-label zRequired for="answer">{{ bufferQuestion }}</label>
          <z-form-control>
            <div class="relative">
              <input
                z-input
                class="w-full pr-10"
                [type]="dynamictype"
                id="answer"
                name="answer"
                [(ngModel)]="answer"
                allowText="answerValidator"
                autocomplete="off"
                required
                #answerf="ngModel"
                placeholder="Enter answer" />
              <button
                type="button"
                class="absolute right-3 top-1/2 inline-flex -translate-y-1/2 items-center justify-center appearance-none border-0 bg-transparent p-0 text-muted-foreground transition-colors hover:text-foreground focus-visible:outline-none focus-visible:text-foreground"
                (click)="togglePWD()"
                [attr.aria-label]="
                  dynamictype === 'text' ? 'Hide answer' : 'Show answer'
                "
                [attr.aria-pressed]="dynamictype === 'text'">
                <ng-icon
                  [name]="dynamictype === 'text' ? 'lucideEyeOff' : 'lucideEye'"
                  size="18"></ng-icon>
              </button>
            </div>
          </z-form-control>
          <z-form-message *ngIf="wrong_answer_msg">{{ wrong_answer_msg }}</z-form-message>
        </z-form-field>

        <button
          z-button
          type="button"
          zType="default"
          zFull
          [disabled]="!answerf.valid"
          (click)="nextQuestion()">
          {{ counter < 2 ? 'Next' : 'Submit' }}
        </button>
      </form>
    </z-card-content>
  </z-card>
</div>

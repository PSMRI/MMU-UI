<div class="support-wrapper">
  <div class="support-card">
    <header class="support-header">
      <img
        class="support-logo"
        src="assets/images/Swasthya.png"
        alt="Piramal Swasthya" />
      <h1 class="support-title">Account Support</h1>
      <p class="support-subtitle">
        Follow the steps to change or reset your password
      </p>
    </header>

    <!-- Step 1 — identify the account -->
    <form
      *ngIf="hideOnGettingQuestions"
      class="support-form"
      autocomplete="off">
      <z-form-field>
        <label z-form-label zRequired for="userID">User Name</label>
        <z-form-control>
          <div class="input-affix">
            <ng-icon
              class="input-icon"
              name="lucideUser"
              size="18"
              aria-hidden="true"></ng-icon>
            <input
              z-input
              class="has-leading-icon"
              type="text"
              id="userID"
              name="userID"
              [(ngModel)]="userID"
              allowText="usernameValidator"
              autocomplete="username"
              minlength="2"
              required
              #uname="ngModel"
              placeholder="Enter user name" />
          </div>
        </z-form-control>
      </z-form-field>

      <div class="button-row">
        <button z-button type="button" zType="outline" [routerLink]="['/']">
          Cancel
        </button>
        <button
          z-button
          type="button"
          zType="default"
          [disabled]="!uname.valid"
          (click)="getQuestions(userID)">
          Next
        </button>
      </div>
    </form>

    <!-- Step 2 — answer the security questions one at a time -->
    <form *ngIf="showQuestions" class="support-form" autocomplete="off">
      <h2 class="question-text">{{ bufferQuestion }}</h2>

      <z-form-field>
        <label z-form-label zRequired for="answer">Answer</label>
        <z-form-control>
          <div class="password-row">
            <div class="input-affix">
              <input
                z-input
                [type]="dynamictype"
                id="answer"
                name="answer"
                [(ngModel)]="answer"
                allowText="answerValidator"
                autocomplete="off"
                required
                #answerf="ngModel"
                placeholder="Enter answer" />
            </div>
            <button
              type="button"
              class="toggle-pwd"
              tabindex="-1"
              (click)="togglePWD()"
              [attr.aria-label]="
                dynamictype === 'text' ? 'Hide answer' : 'Show answer'
              "
              [attr.aria-pressed]="dynamictype === 'text'">
              <ng-icon
                [name]="dynamictype === 'text' ? 'lucideEyeOff' : 'lucideEye'"
                size="18"></ng-icon>
            </button>
          </div>
        </z-form-control>
        <z-form-message *ngIf="wrong_answer_msg">{{
          wrong_answer_msg
        }}</z-form-message>
      </z-form-field>

      <div class="button-row">
        <button
          z-button
          type="button"
          zType="default"
          zFull
          [disabled]="!answerf.valid || counter > 1"
          (click)="nextQuestion()">
          Next
        </button>
        <button
          z-button
          type="button"
          zType="default"
          zFull
          [disabled]="!answerf.valid || counter < 2"
          (click)="nextQuestion()">
          Submit
        </button>
      </div>
    </form>
  </div>
</div>

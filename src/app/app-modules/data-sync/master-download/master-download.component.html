<div
  class="flex items-center justify-between gap-3 border-b border-border px-4 py-3 text-sm">
  <div>
    <ng-container *ngIf="!!showVanDetails">
      <span class="font-semibold">Van ID:</span> {{ vanID }}
      <span class="mx-1 text-muted-foreground">||</span>
      <span class="font-semibold">Vehicle No:</span> {{ vehicalNo }}
    </ng-container>
    <span *ngIf="!showVanDetails" class="text-destructive">
      Error in fetching Van Details
    </span>
  </div>
  <button
    z-button
    zType="ghost"
    zSize="icon-sm"
    type="button"
    *ngIf="!showProgressBar"
    aria-label="Close"
    (click)="closeDialog()">
    <ng-icon name="lucideX"></ng-icon>
  </button>
</div>

<div class="space-y-4 p-4">
  <button
    z-button
    type="button"
    (click)="syncDownloadData()"
    [disabled]="showProgressBar || !showVanDetails">
    Download Masters
  </button>

  <div
    *ngIf="showProgressBar"
    class="h-4 w-full overflow-hidden rounded-full bg-muted">
    <div
      class="flex h-full items-center justify-center bg-primary text-[0.625rem] font-medium text-primary-foreground transition-all"
      role="progressbar"
      [style.width.%]="progressValue"
      [attr.aria-valuenow]="progressValue"
      aria-valuemin="0"
      aria-valuemax="100">
      {{ progressValue }}%
    </div>
  </div>

  <section *ngIf="failedMasterList && failedMasterList.length > 0">
    <p class="mb-1 text-sm font-semibold text-destructive">Failed Masters:</p>
    <ul class="m-0 list-none space-y-1 p-0 text-sm">
      <li
        *ngFor="let item of failedMasterList"
        class="rounded-md border border-border px-2 py-1">
        {{ item }}
      </li>
    </ul>
  </section>

  <div
    *ngIf="failedMasterList && failedMasterList.length === 0"
    class="inline-flex items-center gap-1.5 text-sm font-medium text-success">
    <ng-icon name="lucideCheck" size="18"></ng-icon>
    Data downloaded successfully
  </div>
</div>

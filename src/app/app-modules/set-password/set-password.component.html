<div
  class="flex min-h-svh w-full flex-col items-center justify-center gap-6 bg-muted p-6 md:p-10">
  <z-card class="w-full max-w-sm">
    <z-card-header class="flex flex-col items-center gap-1.5 text-center">
      <img
        class="mb-2 h-12 w-auto"
        src="assets/images/Swasthya.png"
        alt="Piramal Swasthya" />
      <z-card-title>Account Support</z-card-title>
      <z-card-description>Choose a new password to finish resetting your account</z-card-description>
    </z-card-header>

    <z-card-content>
      <form #passwordFields="ngForm" class="grid gap-6" autocomplete="off">
        <z-form-field>
          <label z-form-label zRequired for="newpwd">New Password</label>
          <z-form-control>
            <div class="relative">
              <ng-icon
                class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
                name="lucideLock"
                size="18"
                aria-hidden="true"></ng-icon>
              <input
                z-input
                class="w-full pl-9 pr-10"
                [type]="dynamictype"
                id="newpwd"
                name="newpwd"
                [(ngModel)]="newpwd"
                required
                autocomplete="off"
                placeholder="Enter new password" />
              <button
                type="button"
                class="absolute right-3 top-1/2 inline-flex -translate-y-1/2 items-center justify-center appearance-none border-0 bg-transparent p-0 text-muted-foreground transition-colors hover:text-foreground focus-visible:outline-none focus-visible:text-foreground"
                (click)="togglePWD()"
                [attr.aria-label]="
                  dynamictype === 'text' ? 'Hide password' : 'Show password'
                "
                [attr.aria-pressed]="dynamictype === 'text'">
                <ng-icon
                  [name]="dynamictype === 'text' ? 'lucideEyeOff' : 'lucideEye'"
                  size="18"></ng-icon>
              </button>
            </div>
          </z-form-control>
        </z-form-field>

        <z-form-field>
          <label z-form-label zRequired for="confirmpwd">Confirm Password</label>
          <z-form-control>
            <div class="relative">
              <ng-icon
                class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"
                name="lucideLock"
                size="18"
                aria-hidden="true"></ng-icon>
              <input
                z-input
                class="w-full pl-9 pr-10"
                [type]="dynamictype"
                id="confirmpwd"
                name="confirmpwd"
                [(ngModel)]="confirmpwd"
                required
                autocomplete="off"
                placeholder="Re-enter new password" />
              <button
                type="button"
                class="absolute right-3 top-1/2 inline-flex -translate-y-1/2 items-center justify-center appearance-none border-0 bg-transparent p-0 text-muted-foreground transition-colors hover:text-foreground focus-visible:outline-none focus-visible:text-foreground"
                (click)="togglePWD()"
                [attr.aria-label]="
                  dynamictype === 'text' ? 'Hide password' : 'Show password'
                "
                [attr.aria-pressed]="dynamictype === 'text'">
                <ng-icon
                  [name]="dynamictype === 'text' ? 'lucideEyeOff' : 'lucideEye'"
                  size="18"></ng-icon>
              </button>
            </div>
          </z-form-control>
        </z-form-field>

        <button
          z-button
          type="button"
          zType="default"
          zFull
          [disabled]="!passwordFields.valid"
          (click)="updatePassword(newpwd)">
          Change Password
        </button>
      </form>
    </z-card-content>
  </z-card>
</div>

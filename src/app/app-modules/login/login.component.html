<div class="login-wrapper">
  <form
    class="login-card"
    [formGroup]="loginForm"
    (ngSubmit)="loginForm.valid && login()"
    autocomplete="off">
    <header class="login-header">
      <img
        class="login-logo"
        src="assets/images/Swasthya.png"
        alt="Piramal Swasthya" />
      <h1 class="login-title">AMRIT MMU</h1>
      <p class="login-subtitle">Sign in to your account to continue</p>
    </header>

    <z-form-field>
      <label z-form-label zRequired>User Name</label>
      <z-form-control>
        <div class="input-affix">
          <ng-icon
            class="input-icon"
            name="lucideUser"
            size="18"
            aria-hidden="true"></ng-icon>
          <input
            z-input
            class="has-leading-icon"
            type="text"
            id="userID"
            name="userName"
            formControlName="userName"
            allowText="usernameValidator"
            #focus
            placeholder="Enter user name"
            autocomplete="username" />
        </div>
      </z-form-control>
      <z-form-message
        *ngIf="
          loginForm.controls.userName.touched &&
          loginForm.controls.userName.invalid
        "
        >User name is required.</z-form-message
      >
    </z-form-field>

    <z-form-field>
      <label z-form-label zRequired>Password</label>
      <z-form-control>
        <div class="password-row">
          <div class="input-affix">
            <ng-icon
              class="input-icon"
              name="lucideLock"
              size="18"
              aria-hidden="true"></ng-icon>
            <input
              z-input
              class="has-leading-icon"
              [type]="dynamictype"
              id="password"
              name="password"
              formControlName="password"
              placeholder="Enter password"
              autocomplete="current-password" />
          </div>
          <button
            type="button"
            class="toggle-pwd"
            tabindex="-1"
            (mousedown)="showPWD()"
            (mouseup)="hidePWD()"
            [attr.aria-label]="
              dynamictype === 'text' ? 'Hide password' : 'Show password'
            "
            [attr.aria-pressed]="dynamictype === 'text'">
            <ng-icon
              [name]="dynamictype === 'text' ? 'lucideEyeOff' : 'lucideEye'"
              size="18"></ng-icon>
          </button>
        </div>
      </z-form-control>
      <z-form-message
        *ngIf="
          loginForm.controls.password.touched &&
          loginForm.controls.password.invalid
        "
        >Password is required.</z-form-message
      >
    </z-form-field>

    <div
      *ngIf="enableCaptcha"
      class="captcha-row"
      role="group"
      aria-labelledby="captcha-label">
      <label id="captcha-label" class="sr-only">Security check</label>
      <app-captcha
        #captchaCmp
        (tokenResolved)="onCaptchaResolved($event)"></app-captcha>
    </div>

    <div class="forgot-row">
      <a class="forgot-link" routerLink="/reset-password">Forgot Password?</a>
    </div>

    <button
      z-button
      type="submit"
      zType="default"
      zFull
      [disabled]="
        (enableCaptcha && (!captchaToken || loginForm.invalid)) ||
        (!enableCaptcha && loginForm.invalid)
      ">
      Login
    </button>
  </form>

  <footer class="login-footer">
    <span>© 2026 PSMRI · AMRIT</span>
  </footer>
</div>

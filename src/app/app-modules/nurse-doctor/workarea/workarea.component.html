<div class="w-full">
  <!-- Loading overlay -->
  <div
    *ngIf="showProgressBar"
    class="fixed inset-0 z-50 flex items-center justify-center bg-background/60">
    <z-loader></z-loader>
  </div>

  <!-- Beneficiary details panel (slide-over) -->
  <z-sheet [(zOpen)]="benSidenavOpen" zSide="left">
    <app-beneficiary-details></app-beneficiary-details>
  </z-sheet>

  <div class="px-4 pb-10 pt-3">
    <!-- Quick actions (were floating FAB buttons) -->
    <div class="mb-4 flex items-center gap-2">
      <button
        z-button
        zType="outline"
        zSize="icon"
        type="button"
        aria-label="Beneficiary details"
        (click)="toggleBenSidenav()">
        <ng-icon name="lucideUserRound"></ng-icon>
      </button>
      <button
        z-button
        zType="outline"
        zSize="icon"
        type="button"
        [zTooltip]="currentLanguageSet?.benPreviousVisitDetails"
        zPosition="bottom"
        aria-label="Previous visit details"
        (click)="openBenPreviousisitDetails()">
        <ng-icon name="lucideFileText"></ng-icon>
      </button>
    </div>

    <form
      [formGroup]="patientMedicalForm"
      autocomplete="off"
      (keyup.enter)="preventSubmitOnEnter($event)">
      <!-- Stepper indicator -->
      <z-stepper [zActiveIndex]="currentStep" class="mb-6 w-full justify-center">
        <z-step
          *ngIf="showVisitDetails"
          [zLabel]="currentLanguageSet?.nurseData?.visitDetails"></z-step>
        <z-step
          *ngIf="showTMVisitDetails"
          [zLabel]="currentLanguageSet?.nurseData?.visitDetails"></z-step>
        <z-step
          *ngIf="showAnc"
          [zLabel]="currentLanguageSet?.ancData?.anc"></z-step>
        <z-step
          *ngIf="showPNC"
          [zLabel]="currentLanguageSet?.pncData?.pnc"></z-step>
        <z-step
          *ngIf="showHistory"
          [zLabel]="currentLanguageSet?.common?.history"></z-step>
        <z-step
          *ngIf="showVitals"
          [zLabel]="
            currentLanguageSet?.vitalsDetails?.vitalsDataANC_OPD_NCD_PNC?.vitals
          "></z-step>
        <z-step
          *ngIf="showExamination"
          [zLabel]="currentLanguageSet?.ExaminationData?.examination"></z-step>
        <z-step
          *ngIf="showNCDScreening"
          [zLabel]="currentLanguageSet?.idrs?.screening"></z-step>
        <z-step
          *ngIf="showCaseRecord"
          [zLabel]="currentLanguageSet?.common?.caseRecord"></z-step>
        <z-step
          *ngIf="showQuickConsult"
          [zLabel]="
            currentLanguageSet?.historyData?.QuickConsultDetails?.quickconsult
          "></z-step>
        <z-step
          *ngIf="showRefer"
          [zLabel]="currentLanguageSet?.Referdetails?.revisitAndRefer"></z-step>
      </z-stepper>

      <!-- Visit Details -->
      <div *ngIf="activeStepKey === 'visitDetails'">
        <app-visit-details
          [mode]="visitMode"
          [patientVisitDataForm]="patientVisitForm"></app-visit-details>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button z-button type="button" (click)="nextStep(); checkMandatory()">
            {{ currentLanguageSet?.common?.next }}
          </button>
        </div>
      </div>

      <!-- TM Visit Details -->
      <div *ngIf="activeStepKey === 'tmVisitDetails'">
        <app-tm-visit-details
          [mode]="visitMode"
          [patientVisitForm]="patientVisitForm"></app-tm-visit-details>
        <div class="mt-5 mb-10 flex flex-wrap items-center gap-2">
          <button
            z-button
            type="button"
            [disabled]="tmcDisable"
            (click)="submitTMPatientVisitForm(patientMedicalForm)">
            {{ currentLanguageSet?.common?.submit }}
          </button>
          <p class="m-0 text-sm text-warning" *ngIf="tmcDisable">
            {{ currentLanguageSet?.common?.pleaseviewTMcasesheet }}
          </p>
        </div>
      </div>

      <!-- ANC -->
      <div *ngIf="activeStepKey === 'anc'">
        <app-nurse-anc
          [mode]="ancMode"
          [patientANCDataForm]="patientANCForm"></app-nurse-anc>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button z-button type="button" (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
          <button
            z-button
            *ngIf="ancMode"
            type="button"
            [disabled]="!patientMedicalForm.controls['patientANCForm'].dirty"
            (click)="updatePatientANC()">
            {{ currentLanguageSet?.common?.update }}
          </button>
        </div>
      </div>

      <!-- PNC -->
      <div *ngIf="activeStepKey === 'pnc'">
        <app-nurse-pnc
          [mode]="pncMode"
          [patientPNCDataForm]="patientPNCForm"></app-nurse-pnc>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button z-button type="button" (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
          <button
            z-button
            *ngIf="pncMode"
            type="button"
            [disabled]="!patientMedicalForm.controls['patientPNCForm'].dirty"
            (click)="updatePatientPNC()">
            {{ currentLanguageSet?.common?.update }}
          </button>
        </div>
      </div>

      <!-- History -->
      <div *ngIf="activeStepKey === 'history'">
        <app-nurse-history
          [mode]="historyMode"
          [visitCategory]="visitCategory"
          [pregnancyStatus]="pregnancyStatus"
          [primeGravidaStatus]="primeGravidaStatus"
          [patientHistoryDataForm]="patientHistoryForm"></app-nurse-history>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button z-button type="button" (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
          <button
            z-button
            *ngIf="historyMode"
            type="button"
            [disabled]="!patientMedicalForm.controls['patientHistoryForm'].dirty"
            (click)="updatePatientHistory()">
            {{ currentLanguageSet?.common?.update }}
          </button>
        </div>
      </div>

      <!-- Vitals -->
      <div *ngIf="activeStepKey === 'vitals'">
        <app-nurse-vitals
          [vitalsMode]="vitalsMode"
          [pregnancyStatus]="pregnancyStatus"
          [visitCategory]="visitCategory"
          [patientVitalsDataForm]="patientVitalsForm"></app-nurse-vitals>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button
            z-button
            type="button"
            *ngIf="!showExamination && !showRefer && !showNCDScreening"
            [disabled]="disableSubmitButton"
            (click)="submitPatientMedicalDetailsForm(patientMedicalForm)">
            {{ currentLanguageSet?.common?.submit }}
          </button>
          <button
            z-button
            *ngIf="showExamination || showCaseRecord || showNCDScreening"
            type="button"
            (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
          <button
            z-button
            *ngIf="vitalsMode"
            type="button"
            [disabled]="
              !patientMedicalForm.controls['patientVitalsForm'].dirty &&
              !enableUpdateButtonInVitals
            "
            (click)="updatePatientVitals()">
            {{ currentLanguageSet?.common?.update }}
          </button>
        </div>
      </div>

      <!-- Examination -->
      <div *ngIf="activeStepKey === 'examination'">
        <app-nurse-examination
          [examinationMode]="examinationMode"
          [visitCategory]="visitCategory"
          [patientExaminationDataForm]="
            patientExaminationForm
          "></app-nurse-examination>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button
            z-button
            type="button"
            *ngIf="!showRefer"
            [disabled]="disableSubmitButton"
            (click)="submitPatientMedicalDetailsForm(patientMedicalForm)">
            {{ currentLanguageSet?.common?.submit }}
          </button>
          <button
            z-button
            *ngIf="showCaseRecord"
            type="button"
            (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
          <button
            z-button
            *ngIf="examinationMode"
            type="button"
            [disabled]="!patientExaminationForm.dirty"
            (click)="updatePatientExamination()">
            {{ currentLanguageSet?.common?.update }}
          </button>
        </div>
      </div>

      <!-- NCD Screening (IDRS) -->
      <div *ngIf="activeStepKey === 'ncdScreening'">
        <app-idrs
          [ncdScreeningMode]="ncdScreeningMode"
          [patientMedicalForm]="patientMedicalForm"
          (IDRSChanged)="idrsChange($event)"
          [idrsScreeningForm]="idrsScreeningForm"></app-idrs>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button
            z-button
            *ngIf="!ncdScreeningMode"
            type="button"
            [disabled]="disableSubmitButton"
            (click)="submitPatientMedicalDetailsForm(patientMedicalForm)">
            {{ currentLanguageSet?.common?.submit }}
          </button>
          <button
            z-button
            *ngIf="showCaseRecord"
            type="button"
            (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
          <button
            z-button
            *ngIf="ncdScreeningMode"
            type="button"
            [disabled]="enableIDRSUpdate"
            (click)="updatePatientNcdScreening()">
            {{ currentLanguageSet?.common?.update }}
          </button>
        </div>
      </div>

      <!-- Case Record -->
      <div *ngIf="activeStepKey === 'caseRecord'">
        <app-case-record
          [caseRecordMode]="caseRecordMode"
          [visitCategory]="visitCategory"
          [pregnancyStatus]="pregnancyStatus"
          [findings]="findings"
          [currentVitals]="currentVitals"
          [patientCaseRecordForm]="patientCaseRecordForm"></app-case-record>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button
            z-button
            *ngIf="showExamination || showHistory"
            type="button"
            (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
        </div>
      </div>

      <!-- Quick Consult -->
      <div *ngIf="activeStepKey === 'quickConsult'">
        <app-doctor-quick-consult
          [quickConsultMode]="quickConsultMode"
          [patientQuickConsultForm]="
            patientQuickConsultForm
          "></app-doctor-quick-consult>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button z-button type="button" (click)="nextStep()">
            {{ currentLanguageSet?.common?.next }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
        </div>
      </div>

      <!-- Refer -->
      <div *ngIf="activeStepKey === 'refer'">
        <app-refer
          [referMode]="referMode"
          [visitCategory]="visitCategory"
          [patientReferForm]="patientReferForm"></app-refer>
        <div class="mt-5 mb-10 flex flex-wrap gap-2">
          <button
            z-button
            *ngIf="doctorFlag === 1"
            type="submit"
            [disabled]="disableSubmitButton"
            (click)="submitDoctorDiagnosisForm()">
            {{ currentLanguageSet?.common?.submit }}
          </button>
          <button
            z-button
            *ngIf="doctorFlag !== 1 && visitCategory !== 'General OPD (QC)'"
            type="submit"
            (click)="updateDoctorDiagnosisForm()">
            {{ doctorUpdateAndTCSubmit }}
          </button>
          <button
            z-button
            *ngIf="doctorFlag !== 1 && visitCategory === 'General OPD (QC)'"
            type="submit"
            (click)="updateQuickConsultDiagnosisForm()">
            {{ doctorUpdateAndTCSubmit }}
          </button>
          <button z-button zType="outline" type="button" (click)="previousStep()">
            {{ currentLanguageSet?.common?.back }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<div
  *ngIf="previous"
  class="mb-3 flex items-center justify-between rounded-md bg-muted px-3 py-2">
  <p class="text-lg font-medium leading-8 text-foreground">
    {{ currentLanguageSet?.nurseData?.visitDetails }}
  </p>
  <button
    type="button"
    z-button
    zType="ghost"
    zSize="icon"
    [matDialogClose]="false"
    aria-label="Close">
    <ng-icon name="lucideX"></ng-icon>
  </button>
</div>
<div [ngClass]="{ 'max-h-[75vh] overflow-auto': previous }">
  <app-cancer-case-sheet
    *ngIf="CancerScreening"
    [previous]="previous"
    [serviceType]="serviceType"></app-cancer-case-sheet>
  <app-general-case-sheet
    *ngIf="General"
    [previous]="previous"
    [serviceType]="serviceType"></app-general-case-sheet>
</div>

<!-- Header Navigation -->
<div
  *ngIf="!hideBack"
  class="sticky top-0 z-[100] bg-white/60 backdrop-blur-2xl border-b border-gray-100 p-5 mb-8 print:hidden">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <button
      z-button
      variant="outline"
      size="sm"
      class="font-black uppercase tracking-widest text-[10px] group"
      (click)="goBack()">
      <ng-icon
        name="lucideChevronLeft"
        class="mr-2 group-hover:-translate-x-1 transition-transform"></ng-icon>
      {{ currentLanguageSet?.common?.back }}
    </button>

    <div class="flex items-center gap-4">
      <button
        *ngIf="enablePrescriptionButton"
        z-button
        variant="primary"
        size="sm"
        class="font-black uppercase tracking-widest text-[10px] shadow-lg shadow-indigo-100"
        (click)="prescribeTMMedicine()">
        <ng-icon name="lucidePill" class="mr-2"></ng-icon>
        {{ currentLanguageSet?.casesheet?.PrescribeTmMedicine }}
      </button>

      <button
        z-button
        variant="outline"
        size="sm"
        class="font-black uppercase tracking-widest text-[10px]"
        (click)="downloadCasesheet()">
        <ng-icon name="lucidePrinter" class="mr-2"></ng-icon>
        {{ currentLanguageSet?.casesheet?.print }}
      </button>
    </div>
  </div>
</div>

<!-- Floating Action Menu -->
<div class="fixed bottom-10 right-10 flex flex-col gap-5 z-[150] print:hidden">
  <button
    *ngIf="!hideSelectQC"
    z-button
    variant="primary"
    size="icon"
    class="rounded-2xl shadow-2xl shadow-indigo-200 w-14 h-14 hover:scale-110 transition-all duration-300"
    [zTooltip]="currentLanguageSet?.casesheet?.caseComponent"
    (click)="selectPrintPage()">
    <ng-icon name="lucideLayoutGrid" class="text-xl"></ng-icon>
  </button>

  <div class="flex flex-col gap-3">
    <button
      *ngIf="!previous"
      z-button
      variant="outline"
      size="icon"
      class="rounded-xl bg-white/80 backdrop-blur-md shadow-lg w-10 h-10 hover:bg-white transition-colors"
      [zTooltip]="currentLanguageSet?.casesheet?.goTop"
      (click)="goToTop()">
      <ng-icon name="lucideArrowUp" class="text-lg text-gray-500"></ng-icon>
    </button>

    <button
      *ngIf="!previous"
      z-button
      variant="outline"
      size="icon"
      class="rounded-xl bg-white/80 backdrop-blur-md shadow-lg w-10 h-10 hover:bg-white transition-colors"
      [zTooltip]="currentLanguageSet?.casesheet?.printCaseheet"
      (click)="downloadCasesheet()">
      <ng-icon name="lucidePrinter" class="text-lg text-gray-500"></ng-icon>
    </button>
  </div>
</div>

<!-- Main Content Area -->
<div class="max-w-7xl mx-auto space-y-16 pb-32 px-6">
  <!-- Diagnosis Section -->
  <section class="animate-in fade-in slide-in-from-bottom-8 duration-700">
    <app-doctor-diagnosis-case-sheet
      [printPagePreviewSelect]="printPagePreviewSelect"
      [caseSheetData]="caseSheetData"
      [previous]="previous"></app-doctor-diagnosis-case-sheet>
  </section>

  <div class="page-break" *ngIf="visitCategory !== 'General OPD (QC)'"></div>

  <!-- ANC Section -->
  <ng-container *ngIf="printPagePreviewSelect?.caseSheetANC">
    <section
      *ngIf="visitCategory === 'ANC'"
      class="animate-in fade-in slide-in-from-bottom-8 duration-700 delay-100">
      <app-anc-case-sheet
        [caseSheetData]="caseSheetData"
        [previous]="previous"></app-anc-case-sheet>
    </section>
    <div class="page-break"></div>
  </ng-container>

  <!-- PNC Section -->
  <ng-container *ngIf="printPagePreviewSelect?.caseSheetPNC">
    <section
      *ngIf="visitCategory === 'PNC'"
      class="animate-in fade-in slide-in-from-bottom-8 duration-700 delay-200">
      <app-pnc-case-sheet
        [caseSheetData]="caseSheetData"
        [previous]="previous"></app-pnc-case-sheet>
    </section>
    <div class="page-break"></div>
  </ng-container>

  <!-- History Section -->
  <ng-container *ngIf="printPagePreviewSelect?.caseSheetHistory">
    <section
      *ngIf="visitCategory !== 'General OPD (QC)'"
      class="animate-in fade-in slide-in-from-bottom-8 duration-700 delay-300">
      <app-history-case-sheet
        [caseSheetData]="caseSheetData"
        [previous]="previous"></app-history-case-sheet>
    </section>
    <div class="page-break"></div>
  </ng-container>

  <!-- Examination Section -->
  <ng-container *ngIf="printPagePreviewSelect?.caseSheetExamination">
    <section
      *ngIf="
        visitCategory !== 'NCD care' &&
        visitCategory !== 'General OPD (QC)' &&
        visitCategory !== 'NCD screening' &&
        visitCategory !== 'COVID-19 Screening'
      "
      class="animate-in fade-in slide-in-from-bottom-8 duration-700 delay-500">
      <app-examination-case-sheet
        [caseSheetData]="caseSheetData"
        [previous]="previous"></app-examination-case-sheet>
    </section>
  </ng-container>
</div>

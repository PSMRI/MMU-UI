<div class="mt-2.5 w-full">
  <app-nurse-cancer-history
    *ngIf="showCancer"
    [mode]="mode"
    [pregnancyStatus]="pregnancyStatus"
    [nurseCancerHistoryForm]="patientHistoryDataForm"></app-nurse-cancer-history>
  <app-nurse-general-opd-history
    *ngIf="showGeneralOPD"
    [mode]="mode"
    [visitCategory]="visitCategory"
    [primiGravida]="primeGravidaStatus"
    [pregnancyStatus]="pregnancyStatus"
    [nurseGeneralHistoryForm]="
      patientHistoryDataForm
    "></app-nurse-general-opd-history>
</div>

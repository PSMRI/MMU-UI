<z-accordion
  [formGroup]="nurseCancerHistoryForm"
  zType="single"
  class="flex flex-col gap-4">
  <z-accordion-item
    zValue="family"
    class="rounded-lg border border-border bg-card">
    <div class="px-4">
      <z-accordion-trigger class="flex-1 text-left">
        <span class="text-sm font-semibold text-foreground">
          {{
            currentLanguageSet?.historyData?.cancerScreeningHistory
              ?.familyMedical?.familyMedicalHistory
          }}
        </span>
      </z-accordion-trigger>
    </div>
    <z-accordion-content>
      <div class="px-4">
        <app-nurse-cancer-family-disease-history
          [mode]="mode"
          [cancerPatientFamilyMedicalHistoryForm]="
            cancerPatientFamilyMedicalHistoryForm
          "></app-nurse-cancer-family-disease-history>
      </div>
    </z-accordion-content>
  </z-accordion-item>

  <z-accordion-item
    zValue="personal"
    class="rounded-lg border border-border bg-card">
    <div class="px-4">
      <z-accordion-trigger class="flex-1 text-left">
        <span class="text-sm font-semibold text-foreground">
          {{
            currentLanguageSet?.historyData?.cancerScreeningHistory?.personal
              ?.personalHistory
          }}
        </span>
      </z-accordion-trigger>
    </div>
    <z-accordion-content>
      <div class="px-4">
        <app-nurse-cancer-personal-history
          [cancerPatientPerosnalHistoryForm]="
            cancerPatientPerosnalHistoryForm
          "></app-nurse-cancer-personal-history>
      </div>
    </z-accordion-content>
  </z-accordion-item>

  <z-accordion-item
    *ngIf="
      (templateBeneficiaryDetails?.genderName === 'Female' &&
        templateBeneficiaryDetails?.ageVal > 19) ||
      (templateBeneficiaryDetails?.genderName === 'Transgender' &&
        templateBeneficiaryDetails?.ageVal > 19)
    "
    zValue="obstetric"
    class="rounded-lg border border-border bg-card">
    <div class="px-4">
      <z-accordion-trigger class="flex-1 text-left">
        <span class="text-sm font-semibold text-foreground">
          {{
            currentLanguageSet?.historyData?.cancerScreeningHistory?.obstetric
              ?.obstetricHistory
          }}
        </span>
      </z-accordion-trigger>
    </div>
    <z-accordion-content>
      <div class="px-4">
        <app-nurse-cancer-obstetric-history
          [cancerPatientObstetricHistoryForm]="cancerPatientObstetricHistoryForm"
          [ispregnant]="pregnancyStatus"></app-nurse-cancer-obstetric-history>
      </div>
    </z-accordion-content>
  </z-accordion-item>
</z-accordion>

<z-accordion #examinationAccordion class="flex flex-col gap-4">
  <z-accordion-item
    zValue="generalExamination"
    class="rounded-lg border border-border bg-card px-4">
    <z-accordion-trigger class="text-left">
      <span class="text-sm font-semibold text-foreground">
        {{
          currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination
            ?.genExamination?.generalExamination
        }}
      </span>
    </z-accordion-trigger>
    <z-accordion-content>
      <app-nurse-general-examination
        [generalExaminationDataForm]="
          generalExaminationForm
        "></app-nurse-general-examination>
    </z-accordion-content>
  </z-accordion-item>

  <z-accordion-item
    zValue="headToToeExamination"
    class="rounded-lg border border-border bg-card px-4">
    <z-accordion-trigger class="text-left">
      <span class="text-sm font-semibold text-foreground">
        {{
          currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.headToToe
            ?.headexamination
        }}
      </span>
    </z-accordion-trigger>
    <z-accordion-content>
      <app-nurse-head-to-toe-examination
        [headToToeExaminationDataForm]="
          headToToeExaminationForm
        "></app-nurse-head-to-toe-examination>
    </z-accordion-content>
  </z-accordion-item>

  <z-accordion-item
    *ngIf="visitCategory !== 'NCD Care'"
    zValue="systemicExamination"
    class="rounded-lg border border-border bg-card px-4">
    <z-accordion-trigger class="text-left">
      <span class="text-sm font-semibold text-foreground">
        {{
          currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
            ?.systemicExamination
        }}
      </span>
    </z-accordion-trigger>
    <z-accordion-content>
      <app-nurse-systemic-examination
        [visitCategory]="visitCategory"
        [systemicExaminationDataForm]="
          systemicExaminationForm
        "></app-nurse-systemic-examination>
    </z-accordion-content>
  </z-accordion-item>
</z-accordion>

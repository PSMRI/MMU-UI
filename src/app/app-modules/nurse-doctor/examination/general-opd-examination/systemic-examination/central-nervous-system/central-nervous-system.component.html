<div
  class="grid grid-cols-1 gap-6 md:grid-cols-12"
  [formGroup]="centralNervousSystemDataForm">
  <div class="md:col-span-4">
    <z-form-field>
      <label z-form-label for="handedness">{{
        currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
          ?.centralANC_OPD_PNC?.handedness
      }}</label>
      <z-form-control>
        <z-select
          id="handedness"
          class="w-full"
          name="handedness"
          formControlName="handedness"
          [zPlaceholder]="
            currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination
              ?.systemic?.centralANC_OPD_PNC?.handedness || ''
          "
          (zSelectionChange)="trackFieldInteraction('Handedness Selection')">
          <z-select-item
            *ngFor="let handedness of selectHandedness"
            [zValue]="handedness.name">
            {{ handedness.name }}
          </z-select-item>
        </z-select>
      </z-form-control>
    </z-form-field>
  </div>

  <div class="md:col-span-12">
    <z-form-field>
      <label z-form-label for="cranialNervesExamination">{{
        currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
          ?.centralANC_OPD_PNC?.cranial
      }}</label>
      <z-form-control>
        <textarea
          z-input
          class="min-h-20 w-full"
          id="cranialNervesExamination"
          allowText="textAreaValidator"
          defaultNull
          name="cranialNervesExamination"
          formControlName="cranialNervesExamination"
          maxlength="300"
          (focus)="trackFieldInteraction('Cranial Nerves Examination')"></textarea>
      </z-form-control>
    </z-form-field>
  </div>

  <div class="md:col-span-12">
    <z-form-field>
      <label z-form-label for="motorSystem">{{
        currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
          ?.centralANC_OPD_PNC?.motorsystem
      }}</label>
      <z-form-control>
        <textarea
          z-input
          class="min-h-20 w-full"
          id="motorSystem"
          allowText="textAreaValidator"
          defaultNull
          name="motorSystem"
          formControlName="motorSystem"
          maxlength="300"
          (focus)="trackFieldInteraction('Motor System')"></textarea>
      </z-form-control>
    </z-form-field>
  </div>

  <div class="md:col-span-12">
    <z-form-field>
      <label z-form-label for="sensorySystem">{{
        currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
          ?.centralANC_OPD_PNC?.sensorysystem
      }}</label>
      <z-form-control>
        <textarea
          z-input
          class="min-h-20 w-full"
          id="sensorySystem"
          allowText="textAreaValidator"
          defaultNull
          name="sensorySystem"
          formControlName="sensorySystem"
          maxlength="300"
          (focus)="trackFieldInteraction('Sensory System')"></textarea>
      </z-form-control>
    </z-form-field>
  </div>

  <div class="md:col-span-12">
    <z-form-field>
      <label z-form-label for="autonomicSystem">{{
        currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
          ?.centralANC_OPD_PNC?.autonomicsystem
      }}</label>
      <z-form-control>
        <textarea
          z-input
          class="min-h-20 w-full"
          id="autonomicSystem"
          allowText="textAreaValidator"
          defaultNull
          name="autonomicSystem"
          formControlName="autonomicSystem"
          maxlength="300"
          (focus)="trackFieldInteraction('Autonomic System')"></textarea>
      </z-form-control>
    </z-form-field>
  </div>

  <div class="md:col-span-12">
    <z-form-field>
      <label z-form-label for="cerebellarSigns">{{
        currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
          ?.centralANC_OPD_PNC?.cerebellarsigns
      }}</label>
      <z-form-control>
        <textarea
          z-input
          class="min-h-20 w-full"
          id="cerebellarSigns"
          allowText="textAreaValidator"
          defaultNull
          name="cerebellarSigns"
          formControlName="cerebellarSigns"
          maxlength="300"
          (focus)="trackFieldInteraction('Cerebellar Signs')"></textarea>
      </z-form-control>
    </z-form-field>
  </div>

  <div class="flex flex-col gap-3 md:col-span-4">
    <label z-form-label for="signsOfMeningealIrritation">{{
      currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
        ?.centralANC_OPD_PNC?.signsofMeningealIrritation
    }}</label>
    <z-radio-group
      id="signsOfMeningealIrritation"
      name="signsOfMeningealIrritation"
      formControlName="signsOfMeningealIrritation"
      zOrientation="horizontal"
      class="gap-6"
      (zChange)="trackFieldInteraction('Signs Of Meningeal Irritation')">
      <z-radio [value]="'Present'">{{
        currentLanguageSet?.common?.present
      }}</z-radio>
      <z-radio [value]="'Absent'">{{
        currentLanguageSet?.common?.absent
      }}</z-radio>
    </z-radio-group>
  </div>

  <div class="md:col-span-12">
    <z-form-field>
      <label z-form-label for="skull">{{
        currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
          ?.centralANC_OPD_PNC?.skull
      }}</label>
      <z-form-control>
        <textarea
          z-input
          class="min-h-20 w-full"
          id="skull"
          allowText="textAreaValidator"
          defaultNull
          name="skull"
          formControlName="skull"
          maxlength="300"
          (focus)="trackFieldInteraction('Skull')"></textarea>
      </z-form-control>
    </z-form-field>
  </div>
</div>

<div [formGroup]="gastroIntestinalSystemDataForm" class="flex flex-col gap-6">
  <!-- Inspection -->
  <z-form-field>
    <label z-form-label for="inspection">{{
      currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro?.inspection
    }}</label>
    <z-form-control>
      <textarea
        z-input
        class="w-full"
        rows="3"
        allowText="textAreaValidator"
        defaultNull
        name="inspection"
        id="inspection"
        formControlName="inspection"
        maxlength="300"
        (focus)="trackFieldInteraction('Inspection')"></textarea>
    </z-form-control>
  </z-form-field>

  <!-- Palpation selects -->
  <div class="grid grid-cols-1 gap-x-6 gap-y-4 md:grid-cols-3">
    <!-- Abdomen texture -->
    <z-form-field>
      <label z-form-label for="palpation_AbdomenTexture">{{
        currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro
          ?.abdomenTexture
      }}</label>
      <z-form-control>
        <z-select
          id="palpation_AbdomenTexture"
          class="w-full"
          name="palpation_AbdomenTexture"
          formControlName="palpation_AbdomenTexture"
          (zSelectionChange)="
            trackFieldInteraction('Abdomen Texture Selection')
          ">
          <z-select-item
            *ngFor="let texture of selectAbdomenTexture"
            [zValue]="texture.name">
            {{ texture.name }}
          </z-select-item>
        </z-select>
      </z-form-control>
    </z-form-field>

    <!-- Liver -->
    <z-form-field>
      <label z-form-label for="palpation_Liver">{{
        currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro?.liver
      }}</label>
      <z-form-control>
        <z-select
          id="palpation_Liver"
          class="w-full"
          name="palpation_Liver"
          formControlName="palpation_Liver"
          (zSelectionChange)="trackFieldInteraction('Liver Selection')">
          <z-select-item
            *ngFor="let liver of selectLiver"
            [zValue]="liver.name">
            {{ liver.name }}
          </z-select-item>
        </z-select>
      </z-form-control>
    </z-form-field>

    <!-- Spleen -->
    <z-form-field>
      <label z-form-label for="palpation_Spleen">{{
        currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro?.spleen
      }}</label>
      <z-form-control>
        <z-select
          id="palpation_Spleen"
          class="w-full"
          name="palpation_Spleen"
          formControlName="palpation_Spleen"
          (zSelectionChange)="trackFieldInteraction('Spleen Selection')">
          <z-select-item
            *ngFor="let spleen of selectSpleen"
            [zValue]="spleen.name">
            {{ spleen.name }}
          </z-select-item>
        </z-select>
      </z-form-control>
    </z-form-field>

    <!-- Tenderness -->
    <div class="flex flex-col gap-2">
      <label z-form-label for="palpation_Tenderness">{{
        currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro?.tenderness
      }}</label>
      <z-radio-group
        id="palpation_Tenderness"
        name="palpation_Tenderness"
        formControlName="palpation_Tenderness"
        zOrientation="horizontal"
        class="gap-6"
        (zChange)="checkWithTenderness()">
        <z-radio [value]="'Present'">{{
          currentLanguageSet?.common?.present
        }}</z-radio>
        <z-radio [value]="'Absent'">{{
          currentLanguageSet?.common?.absent
        }}</z-radio>
      </z-radio-group>
    </div>
  </div>

  <!-- Location of tenderness (conditional) -->
  <z-form-field *ngIf="palpation_Tenderness === 'Present'">
    <label z-form-label for="palpation_LocationOfTenderness">{{
      currentLanguageSet?.ExaminationData?.ANC_OPD_PNCExamination?.systemic
        ?.Gastro?.location
    }}</label>
    <z-form-control>
      <textarea
        z-input
        class="w-full"
        rows="3"
        allowText="textAreaValidator"
        defaultNull
        id="palpation_LocationOfTenderness"
        name="palpation_LocationOfTenderness"
        formControlName="palpation_LocationOfTenderness"
        maxlength="300"
        (focus)="trackFieldInteraction('Location Of Tenderness')"></textarea>
    </z-form-control>
  </z-form-field>

  <!-- Percussion -->
  <z-form-field>
    <label z-form-label for="percussion">{{
      currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro?.percussion
    }}</label>
    <z-form-control>
      <textarea
        z-input
        class="w-full"
        rows="3"
        allowText="textAreaValidator"
        defaultNull
        name="percussion"
        id="percussion"
        formControlName="percussion"
        maxlength="300"
        (focus)="trackFieldInteraction('Percussion')"></textarea>
    </z-form-control>
  </z-form-field>

  <!-- Auscultation -->
  <z-form-field>
    <label z-form-label for="auscultation">{{
      currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro?.auscultation
    }}</label>
    <z-form-control>
      <textarea
        z-input
        class="w-full"
        rows="3"
        allowText="textAreaValidator"
        defaultNull
        name="auscultation"
        id="auscultation"
        formControlName="auscultation"
        maxlength="300"
        (focus)="trackFieldInteraction('Auscultation')"></textarea>
    </z-form-control>
  </z-form-field>

  <!-- Anal region -->
  <z-form-field>
    <label z-form-label for="analRegion">{{
      currentLanguageSet?.ExaminationData?.genralOPD_PNC?.Gastro?.analregion
    }}</label>
    <z-form-control>
      <textarea
        z-input
        class="w-full"
        rows="3"
        allowText="textAreaValidator"
        defaultNull
        name="analRegion"
        id="analRegion"
        formControlName="analRegion"
        maxlength="300"
        (focus)="trackFieldInteraction('Anal Region')"></textarea>
    </z-form-control>
  </z-form-field>
</div>

<div class="px-6 pb-10 pt-6">
  <z-card>
    <z-card-header>
      <z-card-title>{{ currentLanguageSet?.report || 'Reports' }}</z-card-title>
      <z-card-description>{{
        currentLanguageSet?.downloadReport || 'Download Report'
      }}</z-card-description>
    </z-card-header>

    <z-card-content>
      <form [formGroup]="reportForm" class="flex flex-col gap-6">
        <div
          class="grid grid-cols-1 gap-x-6 gap-y-4 sm:grid-cols-2 lg:grid-cols-4">
          <!-- Report -->
          <z-form-field class="gap-1.5">
            <label z-form-label zRequired for="report">{{
              currentLanguageSet?.report
            }}</label>
            <z-form-control>
              <z-select
                id="report"
                class="w-full"
                name="report"
                [zPlaceholder]="currentLanguageSet?.report || 'Report'"
                (zSelectionChange)="onReportSelected($event)"
                (focus)="trackFieldInteraction('Report')">
                <z-select-item
                  *ngFor="let report of reportMaster"
                  [zValue]="report.reportID.toString()">
                  {{ report.reportName }}
                </z-select-item>
              </z-select>
            </z-form-control>
          </z-form-field>

          <!-- From Date -->
          <z-form-field class="gap-1.5">
            <label z-form-label zRequired for="fromDate">{{
              currentLanguageSet?.fromDate || 'From Date'
            }}</label>
            <z-form-control>
              <z-date-picker
                id="fromDate"
                class="w-full"
                formControlName="fromDate"
                zFormat="dd/MM/yyyy"
                [placeholder]="currentLanguageSet?.fromDate || 'From Date'"
                [maxDate]="today"
                (dateChange)="trackFieldInteraction('From Date')" />
            </z-form-control>
          </z-form-field>

          <!-- To Date -->
          <z-form-field class="gap-1.5">
            <label z-form-label zRequired for="toDate">{{
              currentLanguageSet?.toDate || 'To Date'
            }}</label>
            <z-form-control>
              <z-date-picker
                id="toDate"
                class="w-full"
                formControlName="toDate"
                zFormat="dd/MM/yyyy"
                [placeholder]="currentLanguageSet?.toDate || 'To Date'"
                [minDate]="fromDate"
                [maxDate]="today"
                (dateChange)="trackFieldInteraction('To Date')" />
            </z-form-control>
          </z-form-field>

          <!-- Van -->
          <z-form-field class="gap-1.5">
            <label z-form-label zRequired for="van">{{
              currentLanguageSet?.van
            }}</label>
            <z-form-control>
              <z-select
                id="van"
                class="w-full"
                name="van"
                [zDisabled]="!toDate"
                [zPlaceholder]="currentLanguageSet?.van || 'Van'"
                (zSelectionChange)="onVanSelected($event)"
                (focus)="trackFieldInteraction('Van')">
                <z-select-item
                  *ngFor="let van of vanMaster"
                  [zValue]="van.vanID.toString()">
                  {{ van.vehicalNo }}
                </z-select-item>
              </z-select>
            </z-form-control>
          </z-form-field>
        </div>

        <div class="flex justify-end">
          <button
            z-button
            type="button"
            [disabled]="!reportForm.valid"
            (click)="getReportData()">
            <ng-icon name="lucideDownload"></ng-icon>
            {{ currentLanguageSet?.downloadReport }}
          </button>
        </div>
      </form>
    </z-card-content>
  </z-card>
</div>

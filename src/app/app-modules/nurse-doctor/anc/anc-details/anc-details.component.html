<div
  [formGroup]="patientANCDetailsForm"
  class="mt-5 grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
  <!-- Primi gravida (Yes/No radio) -->
  <div class="flex flex-col gap-1.5">
    <label z-form-label zRequired for="primiGravida">{{
      current_language_set?.ancData?.ancDataDetails?.primiGravida
    }}</label>
    <z-radio-group
      id="primiGravida"
      name="primiGravida"
      formControlName="primiGravida"
      zOrientation="horizontal"
      class="flex-wrap gap-4">
      <z-radio [value]="true">{{ current_language_set?.common?.yes }}</z-radio>
      <z-radio [value]="false">{{ current_language_set?.common?.no }}</z-radio>
    </z-radio-group>
  </div>

  <!-- Last menstrual period (date) -->
  <z-form-field class="gap-1.5">
    <label z-form-label zRequired for="lmpDate">{{
      current_language_set?.ancData?.ancDataDetails?.lastMenstrualPeriod
    }}</label>
    <z-form-control>
      <z-date-picker
        class="w-full"
        id="lmpDate"
        name="lmpDate"
        formControlName="lmpDate"
        zFormat="dd/MM/yyyy"
        [minDate]="dob"
        [maxDate]="today"
        (dateChange)="checkupLMP($event)"></z-date-picker>
    </z-form-control>
  </z-form-field>

  <!-- Current gestational age (read-only) -->
  <z-form-field class="gap-1.5">
    <label z-form-label for="gestationalAgeOrPeriodofAmenorrhea_POA">{{
      current_language_set?.ancData?.ancDataDetails?.currentGestationalAge
    }}</label>
    <z-form-control>
      <input
        z-input
        class="w-full"
        autocomplete="off"
        appDefaultNull
        id="gestationalAgeOrPeriodofAmenorrhea_POA"
        name="gestationalAgeOrPeriodofAmenorrhea_POA"
        formControlName="gestationalAgeOrPeriodofAmenorrhea_POA"
        [readonly]="true" />
    </z-form-control>
  </z-form-field>

  <!-- Expected date of delivery (date, read-only) -->
  <z-form-field class="gap-1.5">
    <label z-form-label zRequired for="expDelDt">{{
      current_language_set?.ancData?.ancDataDetails?.eDD
    }}</label>
    <z-form-control>
      <z-date-picker
        class="w-full"
        id="expDelDt"
        name="expDelDt"
        formControlName="expDelDt"
        zFormat="dd/MM/yyyy"></z-date-picker>
    </z-form-control>
  </z-form-field>

  <!-- Period of pregnancy (months) -->
  <z-form-field class="gap-1.5">
    <label z-form-label for="duration">{{
      current_language_set?.ancData?.ancDataDetails?.periodofPregnancy
    }}</label>
    <z-form-control>
      <input
        z-input
        class="w-full"
        autocomplete="off"
        appDefaultNull
        id="duration"
        name="duration"
        formControlName="duration"
        allowText="number"
        allowMax="9"
        (change)="
          checkPeriodOfPregnancy(patientANCDetailsForm.value.duration)
        " />
    </z-form-control>
  </z-form-field>

  <!-- Trimester number (read-only) -->
  <z-form-field class="gap-1.5">
    <label z-form-label for="trimesterNumber">{{
      current_language_set?.ancData?.ancDataDetails?.trimesterNumber
    }}</label>
    <z-form-control>
      <input
        z-input
        class="w-full"
        autocomplete="off"
        appDefaultNull
        id="trimesterNumber"
        name="trimesterNumber"
        formControlName="trimesterNumber"
        [readonly]="true" />
    </z-form-control>
  </z-form-field>
</div>

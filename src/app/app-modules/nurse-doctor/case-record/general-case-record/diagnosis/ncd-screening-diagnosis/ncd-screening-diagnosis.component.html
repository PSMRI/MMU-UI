<div class="mt-3" [formGroup]="generalDiagnosisForm">
  <div class="grid grid-cols-1 sm:grid-cols-2">
    <div class="flex flex-col gap-4">
      <div class="rounded-md bg-muted px-4 py-2">
        <p class="text-sm font-semibold text-foreground">
          {{ current_language_set?.casesheet?.provisionalDiag
          }}<span *ngIf="enableProvisionalDiag">*</span>
        </p>
      </div>

      <ng-container formArrayName="provisionalDiagnosisList">
        <div
          class="flex flex-wrap items-end gap-3"
          *ngFor="
            let diagnosis of provisionalDiagnosisControls;
            let i = index;
            let isLast = last
          ">
          <ng-container [formGroupName]="i">
            <z-form-field class="min-w-0 flex-1 gap-1.5">
              <label z-form-label for="provisionalDiagnosis-{{ i }}">
                {{ current_language_set?.casesheet?.provisionalDiag }}
              </label>
              <z-form-control>
                <div class="relative">
                  <ng-icon
                    name="lucideSearch"
                    class="pointer-events-none absolute top-1/2 left-3 -translate-y-1/2 text-muted-foreground"
                    size="16px"
                    aria-hidden="true"></ng-icon>
                  <input
                    z-input
                    class="w-full pl-9"
                    type="text"
                    autocomplete="off"
                    role="combobox"
                    aria-autocomplete="list"
                    [attr.aria-expanded]="openIndex === i"
                    [attr.aria-controls]="'diagnosis-listbox-' + i"
                    id="provisionalDiagnosis-{{ i }}"
                    name="viewProvisionalDiagnosisProvided"
                    [disabled]="
                      !!diagnosis.get('viewProvisionalDiagnosisProvided')
                        ?.disabled
                    "
                    minlength="3"
                    maxlength="100"
                    #diagnosisInput
                    (keyup)="onDiagnosisInputKeyup(diagnosisInput.value, i)"
                    (focus)="openPanel(i)"
                    (blur)="closePanelDeferred(i)"
                    (keydown)="onInputKeydown($event, i)" />

                  <div
                    *ngIf="openIndex === i && hasPanelContent(i)"
                    class="absolute z-50 mt-1 max-h-60 w-full overflow-y-auto overflow-x-hidden rounded-md border border-border bg-popover p-1 text-popover-foreground shadow-md"
                    role="listbox"
                    [id]="'diagnosis-listbox-' + i"
                    (scroll)="onPanelScroll($event, i)">
                    <div
                      *ngFor="let diag of suggestedDiagnosisList[i]; let d = index"
                      class="relative flex w-full cursor-pointer select-none items-center gap-2 rounded-sm py-1.5 pr-2 pl-8 text-sm outline-none hover:bg-accent hover:text-accent-foreground"
                      [class.bg-accent]="activeIndex[i] === d"
                      [class.text-accent-foreground]="activeIndex[i] === d"
                      role="option"
                      [attr.aria-selected]="isDiagnosisSelected(diag, i)"
                      (mousedown)="onOptionMousedown($event, diag, i)"
                      (mouseenter)="activeIndex[i] = d">
                      <ng-icon
                        *ngIf="isDiagnosisSelected(diag, i)"
                        name="lucideCheck"
                        class="absolute left-2 text-foreground"
                        size="16px"
                        aria-hidden="true"></ng-icon>
                      <span class="min-w-0 flex-1 truncate">{{ diag.term }}</span>
                    </div>
                    <div
                      *ngIf="loadingMore[i]"
                      class="px-2 py-1.5 text-sm text-muted-foreground">
                      {{ current_language_set?.common?.loading || 'Loading…' }}
                    </div>
                    <div
                      *ngIf="noMore[i]"
                      class="px-2 py-1.5 text-sm text-muted-foreground">
                      {{
                        current_language_set?.common?.endOfResults ||
                          'End of results'
                      }}
                    </div>
                  </div>
                </div>
              </z-form-control>
            </z-form-field>

            <div class="flex items-center gap-1">
              <button
                z-button
                type="button"
                zSize="icon"
                *ngIf="isLast"
                [disabled]="checkProvisionalDiagnosisValidity(diagnosis)"
                [zTooltip]="current_language_set?.common?.add || 'Add'"
                [attr.aria-label]="current_language_set?.common?.add || 'Add'"
                (click)="addDiagnosis()">
                <ng-icon name="lucidePlus"></ng-icon>
              </button>
              <button
                z-button
                type="button"
                zType="destructive"
                zSize="icon"
                *ngIf="
                  diagnosis.get('provisionalDiagnosis')?.disabled ||
                  i !== 0 ||
                  (i === 0 &&
                    generalDiagnosisForm.get('provisionalDiagnosisList')?.value
                      .provisionalDiagnosis !== null &&
                    generalDiagnosisForm.get('provisionalDiagnosisList')?.value
                      .provisionalDiagnosis !== '')
                "
                [zTooltip]="current_language_set?.common?.delete || 'Delete'"
                [attr.aria-label]="current_language_set?.common?.delete || 'Delete'"
                (click)="deleteDiagnosis(i, diagnosis)">
                <ng-icon name="lucideX"></ng-icon>
              </button>
            </div>
          </ng-container>
        </div>
      </ng-container>
    </div>
  </div>
</div>

<div class="space-y-8" [formGroup]="generalDiagnosisForm">
  <section
    class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 space-y-8">
    <div class="space-y-6">
      <h4
        class="text-xl font-bold text-gray-900 border-l-4 border-blue-500 pl-4 flex items-center gap-2">
        <ng-icon name="lucideClipboardList" class="text-blue-500"></ng-icon>
        {{ current_language_set?.casesheet?.provisionalDiag }}
        {{ enableProvisionalDiag ? '*' : '' }}
      </h4>

      <ng-container formArrayName="provisionalDiagnosisList">
        <div class="grid grid-cols-1 gap-6">
          <div
            *ngFor="
              let diagnosis of provisionalDiagnosisControls;
              let i = index;
              let isLast = last
            "
            class="p-6 rounded-2xl bg-gray-50/50 border border-gray-100 hover:border-blue-200 transition-all group">
            <ng-container [formGroupName]="i">
              <div class="flex items-start gap-4">
                <div class="flex-grow">
                  <z-form-field>
                    <z-label>{{
                      current_language_set?.casesheet?.provisionalDiag
                    }}</z-label>
                    <div class="relative">
                      <input
                        z-input
                        formControlName="viewProvisionalDiagnosisProvided"
                        #diagnosisInput
                        (keyup)="onDiagnosisInputKeyup(diagnosisInput.value, i)"
                        placeholder="Search diagnosis..." />

                      <!-- Custom Autocomplete Dropdown -->
                      <div
                        *ngIf="
                          suggestedDiagnosisList[i]?.length > 0 ||
                          loadingMore[i] ||
                          noMore[i]
                        "
                        class="absolute z-50 w-full mt-2 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden max-h-60 overflow-y-auto">
                        <button
                          *ngFor="let diag of suggestedDiagnosisList[i]"
                          type="button"
                          class="w-full px-4 py-3 text-left hover:bg-blue-50 text-sm border-b border-gray-50 last:border-none transition-colors"
                          (click)="onDiagnosisSelected(diag, i)">
                          {{ diag.term }}
                        </button>
                        <div
                          *ngIf="loadingMore[i]"
                          class="px-4 py-3 text-center text-sm text-gray-500 italic">
                          Loading more...
                        </div>
                        <div
                          *ngIf="noMore[i]"
                          class="px-4 py-3 text-center text-sm text-gray-400">
                          End of results
                        </div>
                      </div>
                    </div>
                  </z-form-field>
                </div>

                <div class="flex items-center gap-2 mt-7">
                  <button
                    z-button
                    variant="ghost"
                    size="icon"
                    type="button"
                    class="text-blue-600 hover:bg-blue-50"
                    *ngIf="isLast"
                    [disabled]="checkProvisionalDiagnosisValidity(diagnosis)"
                    (click)="addDiagnosis()"
                    zTooltip="Add New">
                    <ng-icon name="lucidePlusCircle" class="text-lg"></ng-icon>
                  </button>
                  <button
                    z-button
                    variant="ghost"
                    size="icon"
                    type="button"
                    class="text-red-500 hover:bg-red-50"
                    *ngIf="
                      diagnosis.get('provisionalDiagnosis')?.disabled ||
                      i !== 0 ||
                      (i === 0 &&
                        generalDiagnosisForm.get('provisionalDiagnosisList')
                          ?.value[i]?.provisionalDiagnosis)
                    "
                    (click)="deleteDiagnosis(i, diagnosis)"
                    zTooltip="Remove">
                    <ng-icon name="lucideTrash2" class="text-lg"></ng-icon>
                  </button>
                </div>
              </div>
            </ng-container>
          </div>
        </div>
      </ng-container>
    </div>
  </section>
</div>

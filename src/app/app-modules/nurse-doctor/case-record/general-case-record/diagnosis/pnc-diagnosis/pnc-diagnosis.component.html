<div class="mt-2.5" [formGroup]="generalDiagnosisForm">
  <section class="flex flex-col gap-6">
    <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
      <!-- Provisional diagnosis -->
      <div class="flex flex-col gap-3">
        <p
          class="rounded-md bg-muted px-4 py-2 text-sm font-semibold text-foreground">
          {{ current_language_set?.casesheet?.provisionalDiag }}
        </p>
        <ng-container formArrayName="provisionalDiagnosisList">
          <div
            *ngFor="
              let diagnosis of provisionalDiagnosisControls;
              let i = index;
              let isLast = last
            "
            class="flex items-end gap-2"
            [formGroupName]="i">
            <z-form-field class="flex-1">
              <label z-form-label for="viewProvisionalDiagnosisProvided-{{ i }}">
                {{ current_language_set?.casesheet?.provisionalDiag }}
              </label>
              <z-form-control>
                <div class="relative">
                  <input
                    z-input
                    class="w-full"
                    type="text"
                    autocomplete="off"
                    name="viewProvisionalDiagnosisProvided"
                    id="viewProvisionalDiagnosisProvided-{{ i }}"
                    formControlName="viewProvisionalDiagnosisProvided"
                    minlength="3"
                    maxlength="100"
                    required
                    #diagnosisInput
                    (keyup)="onDiagnosisInputKeyup(diagnosisInput.value, i)" />
                  <div
                    *ngIf="suggestedDiagnosisList[i]?.length"
                    role="listbox"
                    class="absolute z-50 mt-1 max-h-60 w-full overflow-auto rounded-md border bg-popover p-1 text-popover-foreground shadow-md">
                    <div
                      *ngFor="let diag of suggestedDiagnosisList[i]"
                      role="option"
                      tabindex="0"
                      class="relative flex w-full cursor-pointer items-center rounded-sm px-2 py-1.5 text-sm hover:bg-accent hover:text-accent-foreground"
                      (click)="onDiagnosisSelected(diag, i)"
                      (keydown.enter)="onDiagnosisSelected(diag, i)">
                      {{ diag.term }}
                    </div>
                  </div>
                </div>
              </z-form-control>
            </z-form-field>
            <div class="flex items-center gap-2 pb-1">
              <button
                z-button
                zType="destructive"
                zSize="icon"
                type="button"
                [attr.aria-label]="current_language_set?.common?.delete"
                *ngIf="
                  i !== 0 ||
                  (i === 0 &&
                    (diagnosis.touched ||
                      diagnosis.get('viewProvisionalDiagnosisProvided')?.disabled))
                "
                (click)="removeProvisionalDiagnosis(i, diagnosis)">
                <ng-icon name="lucideX"></ng-icon>
              </button>
              <button
                z-button
                zSize="icon"
                type="button"
                [attr.aria-label]="current_language_set?.common?.add"
                *ngIf="isLast"
                [disabled]="checkProvisionalDiagnosisValidity(diagnosis)"
                (click)="addProvisionalDiagnosis()">
                <ng-icon name="lucidePlus"></ng-icon>
              </button>
            </div>
          </div>
        </ng-container>
      </div>

      <!-- Confirmatory diagnosis -->
      <div class="flex flex-col gap-3">
        <p
          class="rounded-md bg-muted px-4 py-2 text-sm font-semibold text-foreground">
          {{ current_language_set?.common?.confirmDiagnosis }}
        </p>
        <ng-container formArrayName="confirmatoryDiagnosisList">
          <div
            *ngFor="
              let confirmatoryDiagnosis of confirmatoryDiagnosisControls;
              let i = index;
              let isLast = last
            "
            class="flex items-end gap-2"
            [formGroupName]="i">
            <z-form-field class="flex-1">
              <label z-form-label for="confirmatoryDiagnosis-{{ i }}">
                {{ current_language_set?.common?.confirmDiagnosis }}
              </label>
              <z-form-control>
                <div class="relative">
                  <input
                    z-input
                    class="w-full"
                    type="text"
                    autocomplete="off"
                    name="confirmatoryDiagnosis"
                    id="confirmatoryDiagnosis-{{ i }}"
                    formControlName="confirmatoryDiagnosis"
                    minlength="3"
                    maxlength="100"
                    required
                    #confirmDiagnosisInput
                    (keyup)="
                      onConfirmatoryDiagnosisInputKeyup(
                        confirmDiagnosisInput.value,
                        i
                      )
                    " />
                  <div
                    *ngIf="suggestedConfirmatoryDiagnosisList[i]?.length"
                    role="listbox"
                    class="absolute z-50 mt-1 max-h-60 w-full overflow-auto rounded-md border bg-popover p-1 text-popover-foreground shadow-md">
                    <div
                      *ngFor="let diag of suggestedConfirmatoryDiagnosisList[i]"
                      role="option"
                      tabindex="0"
                      class="relative flex w-full cursor-pointer items-center rounded-sm px-2 py-1.5 text-sm hover:bg-accent hover:text-accent-foreground"
                      (click)="onConfirmatoryDiagnosisSelected(diag, i)"
                      (keydown.enter)="onConfirmatoryDiagnosisSelected(diag, i)">
                      {{ diag.term }}
                    </div>
                  </div>
                </div>
              </z-form-control>
            </z-form-field>
            <div class="flex items-center gap-2 pb-1">
              <button
                z-button
                zType="destructive"
                zSize="icon"
                type="button"
                [attr.aria-label]="current_language_set?.common?.delete"
                *ngIf="
                  i !== 0 ||
                  (i === 0 &&
                    (confirmatoryDiagnosis.touched ||
                      confirmatoryDiagnosis.get('confirmatoryDiagnosis')
                        ?.disabled))
                "
                (click)="
                  removeConfirmatoryDiagnosis(i, confirmatoryDiagnosis)
                ">
                <ng-icon name="lucideX"></ng-icon>
              </button>
              <button
                z-button
                zSize="icon"
                type="button"
                [attr.aria-label]="current_language_set?.common?.add"
                *ngIf="isLast"
                [disabled]="
                  checkConfirmatoryDiagnosisValidity(confirmatoryDiagnosis)
                "
                (click)="addConfirmatoryDiagnosis()">
                <ng-icon name="lucidePlus"></ng-icon>
              </button>
            </div>
          </div>
        </ng-container>
      </div>
    </div>

    <!-- Maternal death -->
    <div class="flex flex-col gap-1.5">
      <label z-form-label for="isMaternalDeath">
        {{ current_language_set?.casesheet?.matDeath }}
      </label>
      <z-radio-group
        id="isMaternalDeath"
        name="isMaternalDeath"
        formControlName="isMaternalDeath"
        zOrientation="horizontal"
        class="gap-4"
        (zChange)="checkWithDeathDetails()">
        <z-radio [value]="true">
          {{ current_language_set?.common?.yes }}
        </z-radio>
        <z-radio [value]="false">
          {{ current_language_set?.common?.no }}
        </z-radio>
      </z-radio-group>
    </div>

    <div
      class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"
      *ngIf="isMaternalDeath">
      <z-form-field>
        <label z-form-label for="placeOfDeath">
          {{ current_language_set?.casesheet?.placeOfDeath }}
        </label>
        <z-form-control>
          <input
            z-input
            class="w-full"
            autocomplete="off"
            defaultNull
            allowText="alphaspace"
            name="placeOfDeath"
            id="placeOfDeath"
            formControlName="placeOfDeath"
            maxlength="50" />
        </z-form-control>
      </z-form-field>

      <z-form-field>
        <label z-form-label for="causeOfDeath">
          {{ current_language_set?.casesheet?.causeOfDeath }}
        </label>
        <z-form-control>
          <input
            z-input
            class="w-full"
            autocomplete="off"
            defaultNull
            allowText="alphaspace"
            name="causeOfDeath"
            id="causeOfDeath"
            formControlName="causeOfDeath"
            maxlength="50" />
        </z-form-control>
      </z-form-field>

      <div class="flex flex-col gap-1.5">
        <label z-form-label for="dateOfDeath">
          {{ current_language_set?.casesheet?.dateOfDeath }}
        </label>
        <z-date-picker
          class="w-full"
          id="dateOfDeath"
          [(ngModel)]="dateOfDeathModel"
          [ngModelOptions]="{ standalone: true }"
          zFormat="dd/MM/yyyy"
          [minDate]="minimumDeathDate"
          [maxDate]="today"
          [placeholder]="current_language_set?.casesheet?.dateOfDeath"
          (dateChange)="onDateOfDeathChange($event)"></z-date-picker>
      </div>
    </div>
  </section>
</div>

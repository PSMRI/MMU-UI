<div class="mt-2.5" [formGroup]="generalDiagnosisForm">
  <z-card class="bg-muted/40">
    <z-card-header>
      <z-card-title
        >{{ current_language_set?.casesheet?.provisionalDiag }}*</z-card-title
      >
    </z-card-header>

    <z-card-content class="flex flex-col gap-3">
      <ng-container formArrayName="provisionalDiagnosisList">
        <div
          class="flex items-start gap-2"
          *ngFor="
            let diagnosis of provisionalDiagnosisControls;
            let i = index;
            let isLast = last
          ">
          <ng-container [formGroupName]="i">
            <div class="min-w-0 flex-1">
              <z-form-field class="w-full">
                <label z-form-label for="viewProvisionalDiagnosisProvided-{{ i }}">{{
                  current_language_set?.casesheet?.provisionalDiag
                }}</label>
                <z-form-control>
                  <!--
                    Server-paginated typeahead built from Zard primitives (no
                    Material). The input's visible text is decoupled from the
                    reactive-form controls via diagnosisDisplay[i] so the stored
                    value type (conceptID/term/provisionalDiagnosis object patch
                    in onDiagnosisSelected) is unchanged; the panel's native
                    (scroll) drives the incremental server search
                    (searchDiagnosisBasedOnPageNo) via onAutoNearEnd.
                  -->
                  <div class="relative w-full">
                    <input
                      z-input
                      class="w-full"
                      id="viewProvisionalDiagnosisProvided-{{ i }}"
                      type="text"
                      autocomplete="off"
                      role="combobox"
                      aria-autocomplete="list"
                      [attr.aria-expanded]="
                        (suggestedDiagnosisList[i]?.length ||
                          loadingMore[i] ||
                          noMore[i]) &&
                        openDiagnosisIndex === i
                          ? 'true'
                          : 'false'
                      "
                      name="viewProvisionalDiagnosisProvided"
                      [attr.aria-controls]="'diagnosis-listbox-' + i"
                      [(ngModel)]="diagnosisDisplay[i]"
                      [ngModelOptions]="{ standalone: true }"
                      [disabled]="!!(diagnosis.get('viewProvisionalDiagnosisProvided') ?.disabled)"
                      minlength="3"
                      maxlength="100"
                      required
                      #diagnosisInput
                      (keyup)="onDiagnosisInputKeyup(diagnosisInput.value, i)"
                      (focus)="openDiagnosisIndex = i"
                      (blur)="onDiagnosisBlur(i)" />

                    <div
                      *ngIf="
                        openDiagnosisIndex === i &&
                        (suggestedDiagnosisList[i]?.length ||
                          loadingMore[i] ||
                          noMore[i])
                      "
                      #diagnosisPanel
                      role="listbox"
                      id="diagnosis-listbox-{{ i }}"
                      class="absolute z-50 mt-1 max-h-60 w-full overflow-y-auto rounded-md border border-border bg-popover p-1 text-popover-foreground shadow-md"
                      (scroll)="onDiagnosisPanelScroll(i, diagnosisPanel)">
                      <div
                        *ngFor="let diag of suggestedDiagnosisList[i]"
                        role="option"
                        tabindex="0"
                        [attr.aria-selected]="false"
                        class="flex cursor-pointer items-center rounded-sm px-2 py-1.5 text-sm outline-none hover:bg-accent hover:text-accent-foreground focus:bg-accent focus:text-accent-foreground"
                        (mousedown)="onDiagnosisSelected(diag, i)"
                        (keydown.enter)="onDiagnosisSelected(diag, i)">
                        {{ diag.term }}
                      </div>
                      <div
                        *ngIf="loadingMore[i]"
                        class="px-2 py-1.5 text-sm text-muted-foreground">
                        Loading…
                      </div>
                      <div
                        *ngIf="noMore[i]"
                        class="px-2 py-1.5 text-sm text-muted-foreground">
                        End of results
                      </div>
                    </div>
                  </div>
                </z-form-control>
              </z-form-field>
            </div>

            <div class="mt-7 flex shrink-0 items-center gap-1.5">
              <button
                z-button
                zSize="icon"
                type="button"
                *ngIf="isLast"
                [disabled]="checkProvisionalDiagnosisValidity(diagnosis)"
                [zTooltip]="current_language_set?.common?.add || 'Add'"
                zPosition="top"
                aria-label="{{ current_language_set?.common?.add || 'Add' }}"
                (click)="addDiagnosis()">
                <ng-icon name="lucidePlus"></ng-icon>
              </button>
              <button
                z-button
                zType="destructive"
                zSize="icon"
                type="button"
                *ngIf="
                  diagnosis.get('provisionalDiagnosis')?.disabled ||
                  i !== 0 ||
                  (i === 0 &&
                    generalDiagnosisForm.get('provisionalDiagnosisList')?.value
                      .provisionalDiagnosis !== null &&
                    generalDiagnosisForm.get('provisionalDiagnosisList')?.value
                      .provisionalDiagnosis !== '')
                "
                [zTooltip]="current_language_set?.common?.delete || 'Delete'"
                zPosition="top"
                aria-label="{{ current_language_set?.common?.delete || 'Delete' }}"
                (click)="deleteDiagnosis(i, diagnosis)">
                <ng-icon name="lucideX"></ng-icon>
              </button>
            </div>
          </ng-container>
        </div>
      </ng-container>
    </z-card-content>
  </z-card>
</div>

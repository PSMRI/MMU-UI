<div class="flex max-h-[85vh] w-[56rem] max-w-full flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between gap-4 border-b border-border px-6 py-4">
    <p class="m-0 text-lg font-semibold text-foreground">
      Send Prescription to Beneficiary
    </p>
    <button
      z-button
      zType="ghost"
      zSize="icon-sm"
      type="button"
      aria-label="Close"
      (click)="onClose()">
      <ng-icon name="lucideX"></ng-icon>
    </button>
  </div>

  <!-- Scrollable content -->
  <div class="flex flex-col gap-6 overflow-y-auto px-6 py-5">
    <!-- Prescription Table -->
    <div class="w-full overflow-x-auto">
      <table z-table>
        <thead z-table-header>
          <tr z-table-row>
            <th z-table-head>Prescription ID</th>
            <th z-table-head>Drug</th>
            <th z-table-head>Strength</th>
            <th z-table-head>Frequency</th>
            <th z-table-head>No. of Days</th>
            <th z-table-head>Remarks</th>
          </tr>
        </thead>
        <tbody z-table-body *ngIf="data?.prescribedDrugs">
          <tr
            z-table-row
            *ngFor="let p of data.prescribedDrugs; let i = index">
            <td z-table-cell>{{ p.prescribedDrugID }}</td>
            <td z-table-cell>{{ p.drugName }}</td>
            <td z-table-cell>{{ p.dosage }}</td>
            <td z-table-cell>{{ p.frequency }}</td>
            <td z-table-cell>{{ p.noOfDays }}</td>
            <td
              z-table-cell
              *ngIf="i === 0"
              [attr.rowspan]="data.prescribedDrugs.length"
              class="align-top">
              {{ data.remarks }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- SMS Section -->
    <div class="flex flex-wrap items-end gap-4">
      <z-checkbox
        name="altNum"
        class="pb-2.5"
        [(ngModel)]="altNum">
        {{ currentLanguageSet?.alternateNumber }}
      </z-checkbox>

      <z-form-field *ngIf="altNum" class="w-64 max-w-full">
        <label z-form-label for="sms-mobile-number">{{
          currentLanguageSet?.mobileNumber
        }}</label>
        <z-form-control>
          <input
            z-input
            id="sms-mobile-number"
            type="text"
            class="bg-background"
            required
            minlength="10"
            maxlength="10"
            pattern="^[0-9]\d{9}$"
            inputmode="numeric"
            autocomplete="off"
            [placeholder]="currentLanguageSet?.enterTenDigitMobileNumber"
            name="mobileNumber"
            #phnNum="ngModel"
            [(ngModel)]="mobileNumber"
            (keyup)="mobileNum(mobileNumber)"
            (keypress)="allowOnlyNumbers($event)" />
        </z-form-control>
        <z-form-message *ngIf="phnNum.invalid && phnNum.touched" zType="error">
          {{ currentLanguageSet?.enterTenDigitMobileNumber }}
        </z-form-message>
      </z-form-field>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex justify-end gap-2 border-t border-border px-6 py-4">
    <button z-button zType="default" type="button" (click)="sendSMS()">
      <ng-icon name="lucideSend"></ng-icon>
      Send SMS
    </button>
  </div>
</div>
